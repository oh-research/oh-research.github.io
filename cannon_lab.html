<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>대포 실험실 (Cannon Lab)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0f172a;--panel:#1e293b;--accent:#f59e0b;--accent2:#3b82f6;
  --accent3:#10b981;--danger:#ef4444;--text:#f1f5f9;--muted:#94a3b8;--border:#334155;
}
body{
  background:
    radial-gradient(circle at top left, rgba(245,158,11,.16), transparent 28%),
    radial-gradient(circle at bottom right, rgba(59,130,246,.18), transparent 34%),
    var(--bg);
  color:var(--text);
  font-family:'Noto Sans KR',sans-serif;
  height:100vh;
  overflow:hidden;
}
.page{
  display:flex;
  flex-direction:column;
  width:min(1600px, calc(100vw - 36px));
  height:calc(100vh - 36px);
  margin:18px auto;
  background:rgba(30,41,59,.94);
  border:1px solid rgba(148,163,184,.16);
  border-radius:28px;
  box-shadow:0 28px 72px rgba(2,6,23,.42);
  overflow:hidden;
}
.title-bar{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:12px 16px;background:rgba(0,0,0,.28);border-bottom:1px solid var(--border);flex-shrink:0;}
.title-text{font-family:'Jua',sans-serif;font-size:22px;letter-spacing:.01em;}
.header-actions{display:flex;align-items:center;gap:8px;}
.home-link{padding:7px 12px;border:1px solid var(--border);border-radius:999px;background:rgba(15,23,42,.92);backdrop-filter:blur(8px);color:#fff;text-decoration:none;font-size:15px;font-weight:800;line-height:1;letter-spacing:.01em;}
.home-link:hover{color:var(--accent);border-color:var(--accent);}
.app{display:grid;grid-template-columns:1fr 280px 1fr;flex:1;min-height:0;gap:0;}
.panel{background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.panel:last-child{border-right:none;}
.panel-header{padding:10px 14px;background:rgba(0,0,0,.2);font-family:'Jua',sans-serif;font-size:15px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:space-between;}
.panel-title-with-icon{display:inline-flex;align-items:center;gap:8px;}
.panel-title-with-icon svg{width:24px;height:24px;display:block;flex:none;}
.panel-subheader{padding:9px 14px;border-bottom:1px solid var(--border);background:rgba(15,23,42,.5);flex-shrink:0;}
.panel-body{flex:1;overflow:hidden;position:relative;}

/* Cannon Canvas */
#cannonCanvas{width:100%;height:100%;display:block;}
.formula-overlay{position:absolute;top:12px;left:50%;transform:translateX(-50%);z-index:4;max-width:calc(100% - 24px);padding:5px 14px;border-radius:8px;background:rgba(0,0,0,.6);font-family:'Jua',sans-serif;font-size:14px;color:var(--accent2);pointer-events:auto;white-space:nowrap;box-shadow:0 10px 24px rgba(2,6,23,.26);}
.formula-overlay .param-em{color:var(--accent);}
.formula-param{display:inline-flex;align-items:center;min-width:18px;padding:0 2px;border-bottom:1px dashed rgba(245,158,11,.35);cursor:text;}
.formula-param:hover{color:#fde68a;}
.formula-param-input{width:64px;padding:2px 6px;border:1px solid rgba(59,130,246,.45);border-radius:6px;background:rgba(15,23,42,.96);color:#fff;font-family:'Jua',sans-serif;font-size:14px;text-align:center;outline:none;box-shadow:0 0 0 2px rgba(59,130,246,.18);}
.speed-control{display:flex;align-items:center;gap:12px;}
.speed-control-label{font-size:12px;color:var(--muted);font-weight:700;white-space:nowrap;}
.speed-slider{flex:1;accent-color:var(--accent2);cursor:pointer;}
.speed-value{min-width:64px;text-align:right;font-family:'Jua',sans-serif;font-size:14px;color:var(--text);white-space:nowrap;}

/* Data Table */
.table-wrap{flex:1;overflow-y:auto;padding:8px;}
.data-table{width:100%;border-collapse:collapse;font-variant-numeric:tabular-nums;font-size:13px;}
.data-table tbody tr{cursor:pointer;}
.data-table th{color:var(--muted);font-weight:400;padding:6px 8px;border-bottom:1px solid var(--border);text-align:center;font-size:12px;position:sticky;top:0;background:var(--panel);}
.data-table td{padding:6px 8px;text-align:center;border-bottom:1px solid rgba(51,65,85,.3);}
.data-table tr.new-row{animation:flashIn .5s;}
.data-table tr.hover-row td{background:rgba(59,130,246,.14);}
.data-table tr.hover-row td:first-child{border-top-left-radius:8px;border-bottom-left-radius:8px;}
.data-table tr.hover-row td:last-child{border-top-right-radius:8px;border-bottom-right-radius:8px;}
@keyframes flashIn{0%{background:var(--accent);}100%{background:transparent;}}

/* Graph Canvas */
#graphCanvas{width:100%;height:100%;display:block;}
.graph-panel-body{padding:14px;}
.graph-wrap{position:relative;width:100%;height:100%;border-radius:18px;overflow:hidden;background:#1e293b;box-shadow:inset 0 0 0 1px rgba(148,163,184,.12);}
.graph-tooltip{position:absolute;display:none;z-index:20;pointer-events:none;padding:10px 12px;border:1px solid rgba(148,163,184,.35);border-radius:12px;background:rgba(15,23,42,.96);box-shadow:0 12px 28px rgba(2,6,23,.45);white-space:nowrap;transform:translate(-50%, calc(-100% - 12px));}
.graph-tooltip.show{display:block;}
.graph-tooltip-label{display:block;font-size:11px;color:var(--muted);margin-bottom:4px;}
.graph-tooltip-value{display:block;font-family:'Jua',sans-serif;font-size:20px;color:#fff;letter-spacing:.02em;}

/* Bottom Input Bar */
.input-bar{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.6);backdrop-filter:blur(8px);padding:8px 12px;display:flex;align-items:center;gap:6px;z-index:10;}
.space-hint{padding:5px 10px;font-size:11px;border:1px solid var(--accent);border-radius:999px;background:rgba(245,158,11,.14);color:var(--text);font-weight:700;font-family:'Noto Sans KR',sans-serif;}
.auto-count{display:flex;align-items:center;gap:6px;margin-left:auto;padding:4px 8px;border:1px solid var(--border);border-radius:999px;background:rgba(15,23,42,.72);}
.auto-count-label{font-size:11px;color:var(--muted);font-weight:700;white-space:nowrap;}
.auto-count-input{width:52px;padding:4px 6px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-size:12px;text-align:right;font-variant-numeric:tabular-nums;}
.auto-count-input:focus{outline:none;border-color:var(--accent2);}
.auto-btn{padding:7px 12px;background:var(--accent2);color:#fff;border:none;border-radius:999px;cursor:pointer;font-family:'Jua',sans-serif;font-size:13px;box-shadow:0 10px 22px rgba(59,130,246,.28);}
.auto-btn:hover{background:#2563eb;}
.auto-btn:disabled{background:#475569;cursor:default;box-shadow:none;}
.auto-cancel-btn{padding:7px 12px;background:rgba(71,85,105,.92);color:#fff;border:none;border-radius:999px;cursor:pointer;font-family:'Jua',sans-serif;font-size:13px;}
.auto-cancel-btn:hover{background:#64748b;}
.auto-cancel-btn:disabled{opacity:.45;cursor:default;}
.reset-btn{padding:7px 12px;background:rgba(239,68,68,.92);color:#fff;border:none;border-radius:999px;cursor:pointer;font-family:'Jua',sans-serif;font-size:13px;}
.reset-btn:hover{background:#dc2626;}

/* Power Bar */
.power-bar-wrap{position:absolute;bottom:60px;left:50%;transform:translateX(-50%);width:200px;height:24px;background:var(--bg);border-radius:12px;border:2px solid var(--border);overflow:visible;display:none;z-index:10;}
.power-bar-wrap.pulse{animation:powerPulse .22s ease-out;}
.power-bar-fill{position:relative;z-index:1;height:100%;width:0%;transition:none;border-radius:10px;}
.power-bar-scale{position:absolute;left:0;right:0;top:0;bottom:0;z-index:2;pointer-events:none;overflow:visible;}
.power-bar-tick{position:absolute;top:3px;bottom:3px;width:1px;background:rgba(255,255,255,.45);}
.power-bar-tick span{position:absolute;top:-18px;left:50%;transform:translateX(-50%);font-size:10px;color:var(--text);font-variant-numeric:tabular-nums;white-space:nowrap;}
.power-bar-label{position:absolute;inset:0;z-index:3;display:flex;align-items:center;justify-content:center;font-family:'Jua',sans-serif;font-size:13px;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.5);font-variant-numeric:tabular-nums;letter-spacing:.02em;}
@keyframes powerPulse{0%{transform:translateX(-50%) scale(1);}50%{transform:translateX(-50%) scale(1.04);}100%{transform:translateX(-50%) scale(1);}}

/* Settings */
.settings-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;}
.settings-btn:hover{color:var(--text);}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:none;align-items:center;justify-content:center;}
.modal-overlay.show{display:flex;}
.modal{background:var(--panel);border-radius:12px;padding:20px;width:380px;max-width:90vw;}
.modal h3{font-family:'Jua',sans-serif;margin-bottom:14px;}
.modal .close-btn{float:right;background:none;border:none;color:var(--text);font-size:20px;cursor:pointer;}
.modal label{display:block;font-size:12px;color:var(--muted);margin-top:10px;margin-bottom:4px;}
.modal select,.modal input[type=number]{width:100%;padding:7px 10px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;}
.modal select:focus,.modal input:focus{outline:none;border-color:var(--accent);}
.modal .preview{margin-top:10px;padding:8px;background:var(--bg);border-radius:6px;font-family:'Jua',sans-serif;font-size:13px;color:var(--accent2);text-align:center;}
.modal .save-btn{margin-top:14px;width:100%;padding:10px;background:var(--accent);color:#000;border:none;border-radius:8px;font-family:'Jua',sans-serif;font-size:14px;cursor:pointer;}

/* Instruction overlay */
.instruction{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Jua',sans-serif;font-size:16px;color:var(--muted);text-align:center;pointer-events:none;line-height:1.8;}

/* New point pulse */
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(245,158,11,.6);}100%{box-shadow:0 0 0 12px rgba(245,158,11,0);}}

@media(max-width:900px){
  .page{width:calc(100vw - 20px);height:auto;min-height:calc(100vh - 20px);margin:10px auto;border-radius:22px;}
  .title-bar{padding:10px 12px;align-items:flex-start;}
  .title-text{font-size:19px;}
  .app{grid-template-columns:1fr;height:auto;}
  .panel{border-right:none;border-bottom:1px solid var(--border);}
  .panel-body{height:40vh;}
  body{overflow-y:auto;}
}
</style>
</head>
<body>
<div class="page">
  <header class="title-bar">
    <div class="title-text">대포 실험실</div>
    <div class="header-actions">
      <a class="home-link" href="./index.html">← 홈</a>
    </div>
  </header>
  <div class="app">
  <!-- Left: Cannon Visualization -->
  <div class="panel">
    <div class="panel-header">
      <span class="panel-title-with-icon">
        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M12 34H24" stroke="#f8fafc" stroke-width="5" stroke-linecap="round" opacity=".9"/>
          <path d="M8 42H22" stroke="#f8fafc" stroke-width="5" stroke-linecap="round" opacity=".7"/>
          <path d="M16 26H27" stroke="#f8fafc" stroke-width="5" stroke-linecap="round" opacity=".55"/>
          <circle cx="40" cy="34" r="13" fill="#0f172a"/>
          <circle cx="40" cy="34" r="12" stroke="#334155" stroke-width="2"/>
          <circle cx="35.5" cy="29.5" r="3.5" fill="rgba(255,255,255,.18)"/>
        </svg>
        <span>대포 발사</span>
      </span>
    </div>
    <div class="panel-subheader">
      <div class="speed-control">
        <span class="speed-control-label">속도 조절</span>
        <input class="speed-slider" id="speedSlider" type="range" min="1" max="3" step="0.1" value="1">
        <span class="speed-value" id="speedValue">보통 1.0x</span>
      </div>
    </div>
    <div class="panel-body">
      <canvas id="cannonCanvas"></canvas>
      <div class="formula-overlay" id="formulaOverlay"></div>
      <div class="power-bar-wrap" id="powerBarWrap">
        <div class="power-bar-scale" id="powerBarScale"></div>
        <div class="power-bar-fill" id="powerBarFill"></div>
        <div class="power-bar-label" id="powerBarLabel">0.00초</div>
      </div>
      <div class="instruction" id="instruction">스페이스바를 길게 누른 뒤<br>놓으면 발사됩니다</div>
      <div class="input-bar">
        <div class="space-hint">🎮 스페이스바로 발사</div>
        <div class="auto-count">
          <span class="auto-count-label">자동발사</span>
          <input class="auto-count-input" id="autoCountInput" type="number" min="1" max="50" step="1" value="10">
        </div>
        <button class="auto-btn" id="autoBtn" onclick="toggleAutoFire()">자동 발사</button>
        <button class="auto-cancel-btn" id="autoCancelBtn" onclick="cancelAutoFire()" disabled>취소</button>
        <button class="reset-btn" onclick="resetExperiment()">초기화</button>
      </div>
    </div>
  </div>

  <!-- Center: Data Table -->
  <div class="panel">
    <div class="panel-header"><span>📋 데이터</span></div>
    <div class="panel-body" style="display:flex;flex-direction:column;">
      <div class="table-wrap">
        <table class="data-table">
          <thead><tr><th>#</th><th>시간 (x)</th><th>거리 (y)</th></tr></thead>
          <tbody id="dataBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Right: Graph -->
  <div class="panel">
    <div class="panel-header"><span>📈 좌표평면</span></div>
    <div class="panel-body graph-panel-body">
      <div class="graph-wrap">
        <canvas id="graphCanvas"></canvas>
        <div class="graph-tooltip" id="graphTooltip">
          <span class="graph-tooltip-label">좌표</span>
          <span class="graph-tooltip-value" id="graphTooltipValue"></span>
        </div>
      </div>
    </div>
  </div>
  </div>
</div>

<!-- Settings Modal -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <button class="close-btn" onclick="closeSettings()">&times;</button>
    <h3>⚙️ 교사 설정</h3>
    <label>관계식 유형</label>
    <select id="setType" onchange="updatePreview()">
      <option value="linear">1차 (직선): y = a × x + b</option>
      <option value="quadratic">2차 (곡선): y = a × x × x + b × x + c</option>
      <option value="sqrt">제곱근: y = a × √x + b</option>
    </select>
    <label>a</label><input type="number" id="setA" value="25" step="0.1" onchange="updatePreview()">
    <label>b</label><input type="number" id="setB" value="0" step="0.1" onchange="updatePreview()">
    <label>c (2차만)</label><input type="number" id="setC" value="0" step="0.1" onchange="updatePreview()">
    <label>노이즈 레벨 (0 = 정확)</label><input type="number" id="setNoise" value="0" min="0" max="20" step="1">
    <label>최대 시간 (초)</label><input type="number" id="setMax" value="5" min="1" max="5" step="0.5">
    <div class="preview" id="setPreview">y = 25 × x + 0</div>
    <button class="save-btn" onclick="saveSettings()">저장 (데이터 초기화)</button>
  </div>
</div>

<script>
// ══════════════ STATE ══════════════
let funcType = 'linear'; // 'linear' | 'quadratic' | 'sqrt'
let paramA = 25, paramB = 0, paramC = 0;
let noiseLevel = 0;
let maxTime = 5;
let dataPoints = []; // [{x, y, id}]
let nextId = 1;

// Space bar state
let isCharging = false;
let chargeStart = 0;
let chargeTime = 0;
let chargeRAF = null;
let lastChargeCueSecond = 0;
let autoQueue = [];
let autoRunning = false;
let autoPaused = false;
let autoTotalShots = 0;
let autoNextTimeoutId = null;
let animationSpeed = 1;

// Animation state
let animating = false;
let animData = null;
const FLIGHT_BASE_MS = 380;
const FLIGHT_PER_SECOND_MS = 120;
const LANDING_EFFECT_MS = 280;
const LANDING_SETTLE_MS = 220;
const AUTO_GAP_MS = 180;

// Canvases
const cannonCanvas = document.getElementById('cannonCanvas');
const cannonCtx = cannonCanvas.getContext('2d');
const graphCanvas = document.getElementById('graphCanvas');
const graphCtx = graphCanvas.getContext('2d');
const graphTooltip = document.getElementById('graphTooltip');
const graphTooltipValue = document.getElementById('graphTooltipValue');
const formulaOverlay = document.getElementById('formulaOverlay');
const speedSlider = document.getElementById('speedSlider');
const speedValue = document.getElementById('speedValue');
const autoCountInput = document.getElementById('autoCountInput');
const autoCancelBtn = document.getElementById('autoCancelBtn');
const dataBody = document.getElementById('dataBody');
let graphHitPoints = [];
let hoveredGraphPointId = null;
let selectedTablePointId = null;
let editingFormulaParam = null;
let formulaParamDraft = '';

// ══════════════ SEEDED RANDOM ══════════════
function seededRandom(seed) {
  let h = (seed * 2654435761) >>> 0;
  h = ((h ^ (h >>> 16)) * 2246822519) >>> 0;
  h = ((h ^ (h >>> 13)) * 3266489917) >>> 0;
  h = (h ^ (h >>> 16)) >>> 0;
  return h / 4294967296;
}

function calcBaseDistanceValue(x) {
  if (funcType === 'linear') return paramA * x + paramB;
  if (funcType === 'quadratic') return paramA * x * x + paramB * x + paramC;
  return paramA * Math.sqrt(Math.max(0, x)) + paramB;
}

function calcDistance(x) {
  const base = calcBaseDistanceValue(x);

  if (noiseLevel === 0) return Math.round(base * 10) / 10;

  const seed = Math.round(x * 100);
  const noise = (seededRandom(seed) - 0.5) * 2 * noiseLevel;
  return Math.round((base + noise) * 10) / 10;
}

function getReachDistanceRange() {
  const sampleXs = [0, maxTime];
  if (funcType === 'quadratic' && paramA !== 0) {
    const vertexX = -paramB / (2 * paramA);
    if (vertexX > 0 && vertexX < maxTime) sampleXs.push(vertexX);
  }

  const values = sampleXs.map(calcBaseDistanceValue);
  let min = Math.min(...values);
  let max = Math.max(...values);

  if (noiseLevel > 0) {
    min -= noiseLevel;
    max += noiseLevel;
  }

  const span = Math.max(max - min, 1);
  const pad = Math.max(span * 0.12, 5);
  return {
    min,
    max,
    displayMin: min - pad,
    displayMax: max + pad,
  };
}

function distanceToSceneX(value, sceneRange, width) {
  const left = 60;
  const right = width - 20;
  const span = Math.max(sceneRange.displayMax - sceneRange.displayMin, 1);
  const ratio = Math.min(1, Math.max(0, (value - sceneRange.displayMin) / span));
  return left + ratio * (right - left);
}

function drawCannonDistanceMarkers(c, W, H, sceneRange) {
  const span = sceneRange.displayMax - sceneRange.displayMin;
  const step = niceDistStep(span);
  c.font = '10px "Noto Sans KR"';
  c.fillStyle = '#94a3b8';
  c.textAlign = 'center';
  const start = Math.ceil(sceneRange.displayMin / step) * step;
  for (let d = start; d <= sceneRange.displayMax + step * 0.5; d += step) {
    const px = distanceToSceneX(d, sceneRange, W);
    c.beginPath();
    c.moveTo(px, H * 0.7 - 4);
    c.lineTo(px, H * 0.7 + 4);
    c.strokeStyle = '#475569';
    c.lineWidth = 1;
    c.stroke();
    c.fillText(`${formatN(d)}m`, px, H * 0.7 + 16);
  }
}

// ══════════════ INIT ══════════════
function init() {
  parseURL();
  updateSpeedUI();
  renderPowerBarScale();
  resizeAll();
  drawCannon();
  drawGraph();
  window.addEventListener('resize', () => {
    resizeAll();
    hideGraphTooltip();
    drawCannon();
    drawGraph();
  });

  // Keyboard
  document.addEventListener('keydown', e => {
    if (e.code === 'Space' && !isCharging && !animating && !autoRunning) {
      e.preventDefault();
      startCharge();
    }
  });
  document.addEventListener('keyup', e => {
    if (e.code === 'Space' && isCharging) {
      e.preventDefault();
      releaseCharge();
    }
  });
  speedSlider.addEventListener('input', e => {
    animationSpeed = Math.min(3, Math.max(1, parseFloat(e.target.value) || 1));
    updateSpeedUI();
  });
  if (formulaOverlay) formulaOverlay.addEventListener('click', handleFormulaOverlayClick);
  if (dataBody) {
    dataBody.addEventListener('click', handleDataTableClick);
    dataBody.addEventListener('keydown', handleDataTableKeydown);
  }
  graphCanvas.addEventListener('mousemove', handleGraphHover);
  graphCanvas.addEventListener('click', handleGraphClick);
  graphCanvas.addEventListener('mouseleave', clearGraphHover);
  updateAutoButton();
}

function updateSpeedUI() {
  animationSpeed = Math.min(3, Math.max(1, animationSpeed || 1));
  if (speedSlider) speedSlider.value = String(animationSpeed);
  let label = '보통';
  if (animationSpeed > 1) label = '빠름';
  if (speedValue) speedValue.textContent = `${label} ${animationSpeed.toFixed(1)}x`;
}

function renderPowerBarScale() {
  const scale = document.getElementById('powerBarScale');
  if (!scale) return;
  scale.innerHTML = '';
  for (let sec = 1; sec < Math.ceil(maxTime); sec++) {
    if (sec >= maxTime) break;
    const tick = document.createElement('div');
    tick.className = 'power-bar-tick';
    tick.style.left = `${(sec / maxTime) * 100}%`;
    tick.innerHTML = `<span>${sec}s</span>`;
    scale.appendChild(tick);
  }
}

function parseURL() {
  const p = new URLSearchParams(location.search);
  if (p.has('type')) funcType = p.get('type');
  if (p.has('a')) paramA = parseFloat(p.get('a'));
  if (p.has('b')) paramB = parseFloat(p.get('b'));
  if (p.has('c')) paramC = parseFloat(p.get('c'));
  if (p.has('noise')) noiseLevel = parseInt(p.get('noise'));
  if (p.has('max')) maxTime = Math.min(parseFloat(p.get('max')), 5);
  // Sync settings UI
  document.getElementById('setType').value = funcType;
  document.getElementById('setA').value = paramA;
  document.getElementById('setB').value = paramB;
  document.getElementById('setC').value = paramC;
  document.getElementById('setNoise').value = noiseLevel;
  document.getElementById('setMax').value = maxTime;
  updatePreview();
  updateFormulaOverlay();
}

function resizeAll() {
  resize(cannonCanvas, cannonCtx);
  resize(graphCanvas, graphCtx);
}

function resize(cvs, c) {
  const wrap = cvs.parentElement;
  const dpr = window.devicePixelRatio || 1;
  cvs.width = wrap.clientWidth * dpr;
  cvs.height = wrap.clientHeight * dpr;
  c.setTransform(dpr, 0, 0, dpr, 0, 0);
}

// ══════════════ INPUT MODE ══════════════
// ══════════════ CHARGING ══════════════
function startCharge() {
  isCharging = true;
  chargeStart = performance.now();
  chargeTime = 0;
  lastChargeCueSecond = 0;
  document.getElementById('powerBarWrap').style.display = 'block';
  document.getElementById('instruction').style.display = 'none';
  updateCharge();
}

function updateCharge() {
  if (!isCharging) return;
  const elapsed = (performance.now() - chargeStart) / 1000;
  chargeTime = Math.min(elapsed, maxTime);
  const pct = (chargeTime / maxTime) * 100;

  const fill = document.getElementById('powerBarFill');
  fill.style.width = pct + '%';
  // Color gradient: green → yellow → red
  if (pct < 50) fill.style.background = `linear-gradient(90deg, #10b981, #f59e0b)`;
  else fill.style.background = `linear-gradient(90deg, #10b981, #f59e0b, #ef4444)`;

  document.getElementById('powerBarLabel').textContent = chargeTime.toFixed(2) + '초';

  const reachedSecond = Math.floor(chargeTime);
  if (reachedSecond > lastChargeCueSecond) {
    pulsePowerBar();
    lastChargeCueSecond = reachedSecond;
  }

  if (chargeTime < maxTime) {
    chargeRAF = requestAnimationFrame(updateCharge);
  }
}

function pulsePowerBar() {
  const wrap = document.getElementById('powerBarWrap');
  wrap.classList.remove('pulse');
  void wrap.offsetWidth;
  wrap.classList.add('pulse');
}

function releaseCharge() {
  isCharging = false;
  cancelAnimationFrame(chargeRAF);
  const t = Math.round(chargeTime * 10) / 10;
  document.getElementById('powerBarWrap').style.display = 'none';
  if (t > 0) fire(t);
}

function buildAutoShotQueue(requestedCount) {
  const maxTenths = Math.max(1, Math.round(maxTime * 10));
  const usedTimes = new Set(dataPoints.map(point => point.x.toFixed(1)));
  const values = [];
  for (let tenth = 1; tenth <= maxTenths; tenth++) {
    const value = tenth / 10;
    if (!usedTimes.has(value.toFixed(1))) {
      values.push(value);
    }
  }
  for (let i = values.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [values[i], values[j]] = [values[j], values[i]];
  }
  return values.slice(0, Math.min(requestedCount, values.length));
}

function clearAutoNextTimeout() {
  if (autoNextTimeoutId !== null) {
    clearTimeout(autoNextTimeoutId);
    autoNextTimeoutId = null;
  }
}

function scheduleNextAutoShot(delayMs) {
  clearAutoNextTimeout();
  autoNextTimeoutId = setTimeout(() => {
    autoNextTimeoutId = null;
    runNextAutoShot();
  }, delayMs);
}

function finishAutoFire() {
  clearAutoNextTimeout();
  autoQueue = [];
  autoRunning = false;
  autoPaused = false;
  autoTotalShots = 0;
  updateAutoButton();
}

function updateAutoButton() {
  const btn = document.getElementById('autoBtn');
  if (!btn) return;
  if (autoRunning) {
    const fired = autoTotalShots - autoQueue.length;
    btn.textContent = autoPaused ? `이어하기 ${fired}/${autoTotalShots}` : `일시정지 ${fired}/${autoTotalShots}`;
    btn.disabled = false;
    autoCountInput.disabled = true;
    autoCancelBtn.disabled = false;
  } else {
    btn.textContent = '자동 발사';
    btn.disabled = false;
    autoCountInput.disabled = false;
    autoCancelBtn.disabled = true;
  }
}

function startAutoFire() {
  if (animating || isCharging) return;
  const requestedCount = Math.min(Math.max(parseInt(autoCountInput.value, 10) || 10, 1), 50);
  autoCountInput.value = String(requestedCount);
  autoQueue = buildAutoShotQueue(requestedCount);
  if (autoQueue.length === 0) return;
  autoTotalShots = autoQueue.length;
  autoRunning = true;
  autoPaused = false;
  document.getElementById('instruction').style.display = 'none';
  updateAutoButton();
  runNextAutoShot();
}

function pauseAutoFire() {
  if (!autoRunning) return;
  autoPaused = true;
  clearAutoNextTimeout();
  updateAutoButton();
}

function resumeAutoFire() {
  if (!autoRunning) return;
  autoPaused = false;
  updateAutoButton();
  if (!animating) {
    if (autoQueue.length > 0) scheduleNextAutoShot(0);
    else finishAutoFire();
  }
}

function toggleAutoFire() {
  if (!autoRunning) {
    startAutoFire();
  } else if (autoPaused) {
    resumeAutoFire();
  } else {
    pauseAutoFire();
  }
}

function cancelAutoFire() {
  if (!autoRunning && autoQueue.length === 0) return;
  clearAutoNextTimeout();
  autoQueue = [];
  autoRunning = false;
  autoPaused = false;
  autoTotalShots = 0;
  updateAutoButton();
}

function resetExperiment() {
  cancelAutoFire();
  if (chargeRAF) cancelAnimationFrame(chargeRAF);
  isCharging = false;
  chargeStart = 0;
  chargeTime = 0;
  lastChargeCueSecond = 0;
  animating = false;
  animData = null;
  dataPoints = [];
  nextId = 1;
  hoveredGraphPointId = null;
  selectedTablePointId = null;
  hideGraphTooltip();

  const powerWrap = document.getElementById('powerBarWrap');
  const powerFill = document.getElementById('powerBarFill');
  const powerLabel = document.getElementById('powerBarLabel');
  if (powerWrap) {
    powerWrap.style.display = 'none';
    powerWrap.classList.remove('pulse');
  }
  if (powerFill) powerFill.style.width = '0%';
  if (powerLabel) powerLabel.textContent = '0.00초';

  document.getElementById('instruction').style.display = '';
  renderDataTable();
  drawCannon();
  drawGraph();
}

function runNextAutoShot() {
  if (!autoRunning || autoPaused || animating) return;
  if (autoQueue.length === 0) {
    finishAutoFire();
    return;
  }
  const nextShot = autoQueue.shift();
  updateAutoButton();
  fire(nextShot);
}

// ══════════════ FIRE ══════════════
function fire(x) {
  if (animating) return;
  const y = calcDistance(x);
  document.getElementById('instruction').style.display = 'none';

  // Animate
  animating = true;
  const sceneRange = getReachDistanceRange();
  const duration = (FLIGHT_BASE_MS + x * FLIGHT_PER_SECOND_MS) / animationSpeed;

  animData = {
    x, y,
    startTime: performance.now(),
    duration,
    landingEffectSec: (LANDING_EFFECT_MS / animationSpeed) / 1000,
    landingSettleMs: LANDING_SETTLE_MS / animationSpeed,
    sceneRange,
    trail: [],
    landed: false,
    particles: []
  };

  requestAnimationFrame(animateFrame);
}

function animateFrame(now) {
  if (!animData) return;
  const { x, y, startTime, duration, sceneRange } = animData;
  const elapsed = now - startTime;
  const progress = Math.min(elapsed / duration, 1);

  drawCannonFrame(progress, x, y, sceneRange);

  if (progress < 1) {
    requestAnimationFrame(animateFrame);
  } else {
    // Landing complete
    animData.landed = true;
    // Generate dust particles
    animData.particles = [];
    for (let i = 0; i < 12; i++) {
      animData.particles.push({
        vx: (Math.random() - 0.5) * 4,
        vy: -Math.random() * 3 - 1,
        life: 1,
        size: Math.random() * 4 + 2,
      });
    }
    animData.particleStart = now;
    requestAnimationFrame(animateParticles);

    // Add data point
    dataPoints.push({ x, y, id: nextId++ });
    renderDataTable();
    drawGraph();

    setTimeout(() => {
      animating = false;
      if (autoRunning) {
        if (autoQueue.length > 0) {
          if (!autoPaused) scheduleNextAutoShot(AUTO_GAP_MS / animationSpeed);
        } else {
          finishAutoFire();
        }
      }
    }, animData.landingSettleMs);
  }
}

function animateParticles(now) {
  if (!animData || !animData.landed) return;
  const elapsed = (now - animData.particleStart) / 1000;

  animData.particles.forEach(p => {
    p.life = Math.max(0, 1 - elapsed * 2);
  });

  drawCannonFrame(1, animData.x, animData.y, animData.sceneRange, elapsed);

  if (elapsed < animData.landingEffectSec) {
    requestAnimationFrame(animateParticles);
  } else {
    drawCannon(); // Final static frame with flag
  }
}

// ══════════════ CANNON DRAWING ══════════════
function drawCannon() {
  const W = cannonCanvas.width / (window.devicePixelRatio || 1);
  const H = cannonCanvas.height / (window.devicePixelRatio || 1);
  const c = cannonCtx;
  const sceneRange = getReachDistanceRange();
  c.clearRect(0, 0, W, H);

  // Sky gradient
  const skyGrad = c.createLinearGradient(0, 0, 0, H * 0.7);
  skyGrad.addColorStop(0, '#1e3a5f');
  skyGrad.addColorStop(1, '#0f172a');
  c.fillStyle = skyGrad;
  c.fillRect(0, 0, W, H * 0.7);

  // Grass
  const grassGrad = c.createLinearGradient(0, H * 0.7, 0, H);
  grassGrad.addColorStop(0, '#166534');
  grassGrad.addColorStop(1, '#14532d');
  c.fillStyle = grassGrad;
  c.fillRect(0, H * 0.7, W, H * 0.3);

  // Ground line
  c.strokeStyle = '#22c55e';
  c.lineWidth = 2;
  c.beginPath(); c.moveTo(0, H * 0.7); c.lineTo(W, H * 0.7); c.stroke();

  // Distance markers
  drawCannonDistanceMarkers(c, W, H, sceneRange);

  // Cannon
  drawCannonBody(c, W, H);

  // Previous landing flags
  dataPoints.forEach(p => {
    const px = distanceToSceneX(p.y, sceneRange, W);
    drawFlag(c, px, H * 0.7, p.y);
  });
}

function drawCannonFrame(progress, x, y, sceneRange, particleElapsed) {
  const W = cannonCanvas.width / (window.devicePixelRatio || 1);
  const H = cannonCanvas.height / (window.devicePixelRatio || 1);
  const c = cannonCtx;

  // Redraw background
  const skyGrad = c.createLinearGradient(0, 0, 0, H * 0.7);
  skyGrad.addColorStop(0, '#1e3a5f');
  skyGrad.addColorStop(1, '#0f172a');
  c.fillStyle = skyGrad;
  c.fillRect(0, 0, W, H * 0.7);

  const grassGrad = c.createLinearGradient(0, H * 0.7, 0, H);
  grassGrad.addColorStop(0, '#166534');
  grassGrad.addColorStop(1, '#14532d');
  c.fillStyle = grassGrad;
  c.fillRect(0, H * 0.7, W, H * 0.3);

  c.strokeStyle = '#22c55e'; c.lineWidth = 2;
  c.beginPath(); c.moveTo(0, H * 0.7); c.lineTo(W, H * 0.7); c.stroke();

  // Distance markers
  drawCannonDistanceMarkers(c, W, H, sceneRange);

  drawCannonBody(c, W, H);

  // Previous flags
  dataPoints.forEach(p => {
    const px = distanceToSceneX(p.y, sceneRange, W);
    drawFlag(c, px, H * 0.7, p.y);
  });

  // Projectile trajectory
  const cannonTipX = 55;
  const cannonTipY = H * 0.7 - 22;
  const landX = distanceToSceneX(y, sceneRange, W);
  const landY = H * 0.7;

  // Parabolic path
  const bx = progress;
  const projX = cannonTipX + (landX - cannonTipX) * bx;
  const peakH = Math.min(H * 0.35, Math.max(32, 42 + Math.abs(landX - cannonTipX) * 0.18));
  const projY = cannonTipY + (landY - cannonTipY) * bx - peakH * 4 * bx * (1 - bx);

  // Trail
  if (progress < 1) {
    c.strokeStyle = 'rgba(245,158,11,0.3)';
    c.lineWidth = 2;
    c.beginPath();
    for (let t = 0; t <= bx; t += 0.02) {
      const tx = cannonTipX + (landX - cannonTipX) * t;
      const ty = cannonTipY + (landY - cannonTipY) * t - peakH * 4 * t * (1 - t);
      if (t === 0) c.moveTo(tx, ty); else c.lineTo(tx, ty);
    }
    c.stroke();

    // Projectile ball
    c.beginPath();
    c.arc(projX, projY, 6, 0, Math.PI * 2);
    c.fillStyle = '#f59e0b';
    c.fill();
    c.strokeStyle = '#fff'; c.lineWidth = 1.5; c.stroke();
  }

  // Particles on landing
  if (progress >= 1 && animData && animData.particles && particleElapsed !== undefined) {
    animData.particles.forEach(p => {
      if (p.life <= 0) return;
      const px2 = landX + p.vx * particleElapsed * 60;
      const py2 = landY + p.vy * particleElapsed * 60 + 0.5 * 9.8 * particleElapsed * particleElapsed * 60;
      c.globalAlpha = p.life;
      c.beginPath();
      c.arc(px2, Math.min(py2, landY), p.size * p.life, 0, Math.PI * 2);
      c.fillStyle = '#a3866a';
      c.fill();
    });
    c.globalAlpha = 1;

    // Landing flag
    drawFlag(c, landX, landY, y);
  }
}

function drawCannonBody(c, W, H) {
  const cx = 30, cy = H * 0.7;

  // Wheel
  c.beginPath();
  c.arc(cx, cy, 14, 0, Math.PI * 2);
  c.fillStyle = '#64748b';
  c.fill();
  c.strokeStyle = '#94a3b8'; c.lineWidth = 2; c.stroke();

  // Barrel
  c.save();
  c.translate(cx, cy - 8);
  c.rotate(-Math.PI / 6);
  c.fillStyle = '#475569';
  c.fillRect(0, -6, 36, 12);
  c.strokeStyle = '#64748b'; c.lineWidth = 1;
  c.strokeRect(0, -6, 36, 12);
  c.restore();
}

function drawFlag(c, px, groundY, dist) {
  // Pole
  c.strokeStyle = '#94a3b8'; c.lineWidth = 1.5;
  c.beginPath(); c.moveTo(px, groundY); c.lineTo(px, groundY - 28); c.stroke();
  // Flag
  c.fillStyle = '#ef4444';
  c.beginPath();
  c.moveTo(px, groundY - 28);
  c.lineTo(px + 14, groundY - 22);
  c.lineTo(px, groundY - 16);
  c.fill();
  // Label
  c.fillStyle = '#f1f5f9';
  c.font = '10px "Jua"';
  c.textAlign = 'center';
  c.fillText(dist + 'm', px, groundY - 32);
}

function niceDistStep(max) {
  const rough = max / 5;
  const mag = Math.pow(10, Math.floor(Math.log10(rough)));
  const res = rough / mag;
  if (res <= 1.5) return mag;
  if (res <= 3.5) return 2 * mag;
  if (res <= 7.5) return 5 * mag;
  return 10 * mag;
}

// ══════════════ DATA TABLE ══════════════
function renderDataTable() {
  const body = document.getElementById('dataBody');
  body.innerHTML = '';
  if (!dataPoints.some(point => point.id === selectedTablePointId)) {
    selectedTablePointId = null;
  }
  dataPoints.forEach((p, i) => {
    const tr = document.createElement('tr');
    tr.dataset.pointId = String(p.id);
    tr.tabIndex = 0;
    if (i === dataPoints.length - 1) tr.className = 'new-row';
    tr.innerHTML = `<td>${i + 1}</td><td>${p.x}</td><td>${p.y}</td>`;
    body.appendChild(tr);
  });
  updateDataTableHighlight();
  // Auto scroll
  const wrap = body.closest('.table-wrap');
  if (wrap) wrap.scrollTop = wrap.scrollHeight;
}

function getHighlightedPointId() {
  if (hoveredGraphPointId !== null) return hoveredGraphPointId;
  return selectedTablePointId;
}

function updateDataTableHighlight() {
  const rows = document.querySelectorAll('#dataBody tr');
  const highlightedPointId = getHighlightedPointId();
  rows.forEach(row => {
    const isHighlighted = row.dataset.pointId === String(highlightedPointId);
    row.classList.toggle('hover-row', isHighlighted);
    row.setAttribute('aria-selected', isHighlighted ? 'true' : 'false');
  });
}

function selectDataPoint(pointId) {
  selectedTablePointId = selectedTablePointId === pointId ? null : pointId;
  hoveredGraphPointId = null;
  hideGraphTooltip();
  updateDataTableHighlight();
  const selectedRow = document.querySelector(`#dataBody tr[data-point-id="${selectedTablePointId}"]`);
  if (selectedRow) selectedRow.scrollIntoView({ block: 'nearest' });
  if (dataPoints.length > 0) drawGraph();
}

function handleDataTableClick(event) {
  const row = event.target.closest('tr[data-point-id]');
  if (!row || !dataBody || !dataBody.contains(row)) return;
  selectDataPoint(Number(row.dataset.pointId));
}

function handleDataTableKeydown(event) {
  if (event.key !== 'Enter' && event.key !== ' ') return;
  const row = event.target.closest('tr[data-point-id]');
  if (!row || !dataBody || !dataBody.contains(row)) return;
  event.preventDefault();
  selectDataPoint(Number(row.dataset.pointId));
}

function findGraphPointAt(clientX, clientY) {
  if (graphHitPoints.length === 0) return null;
  const rect = graphCanvas.getBoundingClientRect();
  const mx = clientX - rect.left;
  const my = clientY - rect.top;
  let hovered = null;
  let bestDist = Infinity;
  graphHitPoints.forEach(point => {
    const dx = mx - point.cx;
    const dy = my - point.cy;
    const dist = Math.hypot(dx, dy);
    if (dist <= 12 && dist < bestDist) {
      hovered = point;
      bestDist = dist;
    }
  });
  return hovered;
}

// ══════════════ GRAPH ══════════════
function drawGraph() {
  const W = graphCanvas.width / (window.devicePixelRatio || 1);
  const H = graphCanvas.height / (window.devicePixelRatio || 1);
  const c = graphCtx;
  graphHitPoints = [];
  c.clearRect(0, 0, W, H);
  c.fillStyle = '#1e293b';
  c.fillRect(0, 0, W, H);

  if (dataPoints.length === 0) {
    clearGraphHover(true);
    c.fillStyle = '#94a3b8'; c.font = '13px "Noto Sans KR"'; c.textAlign = 'center';
    c.fillText('데이터가 추가되면', W / 2, H / 2 - 10);
    c.fillText('그래프가 나타납니다', W / 2, H / 2 + 10);
    return;
  }

  const pad = { top: 25, right: 25, bottom: 40, left: 50 };
  const xs = dataPoints.map(p => p.x);
  const ys = dataPoints.map(p => p.y);
  let xMin = Math.min(0, Math.min(...xs));
  let xMax = Math.max(...xs);
  let yMin = Math.min(0, Math.min(...ys));
  let yMax = Math.max(...ys);
  const xMargin = (xMax - xMin) * 0.12 || 0.5;
  const yMargin = (yMax - yMin) * 0.12 || 5;
  xMax += xMargin; yMax += yMargin;

  const plotW = W - pad.left - pad.right;
  const plotH = H - pad.top - pad.bottom;
  function toX(v) { return pad.left + (v - xMin) / (xMax - xMin) * plotW; }
  function toY(v) { return pad.top + plotH - (v - yMin) / (yMax - yMin) * plotH; }

  // Grid
  c.strokeStyle = 'rgba(51,65,85,.5)'; c.lineWidth = 0.5;
  c.font = '10px "Noto Sans KR"'; c.fillStyle = '#64748b';
  const xStep = niceDistStep(xMax - xMin);
  const yStep = niceDistStep(yMax - yMin);
  c.textAlign = 'center';
  for (let v = 0; v <= xMax; v += xStep) {
    const px = toX(v);
    c.beginPath(); c.moveTo(px, pad.top); c.lineTo(px, pad.top + plotH); c.stroke();
    c.fillText(formatN(v), px, pad.top + plotH + 14);
  }
  c.textAlign = 'right';
  for (let v = Math.ceil(yMin / yStep) * yStep; v <= yMax; v += yStep) {
    const py = toY(v);
    c.beginPath(); c.moveTo(pad.left, py); c.lineTo(pad.left + plotW, py); c.stroke();
    c.fillText(formatN(v), pad.left - 5, py + 4);
  }

  // Axes
  c.strokeStyle = '#64748b'; c.lineWidth = 1.5;
  if (yMin <= 0 && yMax >= 0) {
    c.beginPath(); c.moveTo(pad.left, toY(0)); c.lineTo(pad.left + plotW, toY(0)); c.stroke();
  }
  if (xMin <= 0 && xMax >= 0) {
    c.beginPath(); c.moveTo(toX(0), pad.top); c.lineTo(toX(0), pad.top + plotH); c.stroke();
  }

  // Labels
  c.fillStyle = '#94a3b8'; c.font = '11px "Noto Sans KR"'; c.textAlign = 'center';
  c.fillText('시간 x (초)', pad.left + plotW / 2, H - 4);
  c.save(); c.translate(10, pad.top + plotH / 2); c.rotate(-Math.PI / 2);
  c.fillText('거리 y (m)', 0, 0); c.restore();

  // Data points
  const highlightedPointId = getHighlightedPointId();
  dataPoints.forEach((p, i) => {
    const cx = toX(p.x), cy = toY(p.y);
    const isHovered = highlightedPointId === p.id;
    graphHitPoints.push({ id: p.id, x: p.x, y: p.y, cx, cy });
    // Point
    c.beginPath(); c.arc(cx, cy, 5, 0, Math.PI * 2);
    c.fillStyle = isHovered ? '#f59e0b' : '#3b82f6'; c.fill();
    c.strokeStyle = '#fff'; c.lineWidth = 1.5; c.stroke();
    if (isHovered) {
      c.beginPath(); c.arc(cx, cy, 11, 0, Math.PI * 2);
      c.strokeStyle = 'rgba(245,158,11,.55)'; c.lineWidth = 3; c.stroke();
    }
    // Pulse for latest
    if (i === dataPoints.length - 1) {
      c.beginPath(); c.arc(cx, cy, 10, 0, Math.PI * 2);
      c.strokeStyle = 'rgba(245,158,11,.4)'; c.lineWidth = 2; c.stroke();
    }
  });
}

function handleGraphHover(e) {
  const hovered = findGraphPointAt(e.clientX, e.clientY);
  if (!hovered) {
    clearGraphHover();
    return;
  }

  if (hoveredGraphPointId !== hovered.id) {
    hoveredGraphPointId = hovered.id;
    updateDataTableHighlight();
    drawGraph();
  }
  showGraphTooltip(hovered);
}

function handleGraphClick(e) {
  const clicked = findGraphPointAt(e.clientX, e.clientY);
  if (!clicked) {
    selectedTablePointId = null;
    clearGraphHover();
    return;
  }
  hoveredGraphPointId = clicked.id;
  showGraphTooltip(clicked);
  selectDataPoint(clicked.id);
}

function showGraphTooltip(point) {
  graphTooltipValue.textContent = `(${formatN(point.x)}, ${formatN(point.y)})`;
  graphTooltip.classList.add('show');
  const body = graphCanvas.parentElement;
  const tooltipWidth = graphTooltip.offsetWidth || 110;
  const x = Math.min(Math.max(point.cx, tooltipWidth / 2 + 8), body.clientWidth - tooltipWidth / 2 - 8);
  const y = Math.max(point.cy - 14, 44);
  graphTooltip.style.left = `${x}px`;
  graphTooltip.style.top = `${y}px`;
  graphCanvas.style.cursor = 'pointer';
}

function hideGraphTooltip() {
  graphTooltip.classList.remove('show');
  graphCanvas.style.cursor = '';
}

function clearGraphHover(skipRedraw) {
  const hadHover = hoveredGraphPointId !== null;
  hoveredGraphPointId = null;
  hideGraphTooltip();
  updateDataTableHighlight();
  if (!skipRedraw && hadHover && dataPoints.length > 0) {
    drawGraph();
  }
}

function formatN(v) {
  if (Number.isInteger(v)) return v.toString();
  if (Math.abs(v) >= 100) return Math.round(v).toString();
  return v.toFixed(1);
}

function formatFormulaValue(v) {
  if (!Number.isFinite(v)) return '0';
  if (Number.isInteger(v)) return v.toString();
  if (Math.abs(v) >= 1000) return Math.round(v).toString();
  return v.toFixed(1);
}

function getFormulaParamValue(paramKey) {
  if (paramKey === 'a') return paramA;
  if (paramKey === 'b') return paramB;
  return paramC;
}

function setFormulaParamValue(paramKey, nextValue) {
  if (paramKey === 'a') paramA = nextValue;
  else if (paramKey === 'b') paramB = nextValue;
  else paramC = nextValue;
}

function renderFormulaParam(paramKey, value) {
  if (editingFormulaParam === paramKey) {
    const draft = formulaParamDraft === '' ? String(value) : formulaParamDraft;
    return `<input class="formula-param-input" id="formulaParamInput" type="number" step="0.1" value="${draft}">`;
  }
  return `<span class="param-em formula-param" data-param="${paramKey}" title="클릭해 수정">${formatFormulaValue(value)}</span>`;
}

function getFormulaText(type, a, b, c) {
  if (type === 'linear') return `y = ${formatFormulaValue(a)} × x + ${formatFormulaValue(b)}`;
  if (type === 'quadratic') return `y = ${formatFormulaValue(a)} × x × x + ${formatFormulaValue(b)} × x + ${formatFormulaValue(c)}`;
  return `y = ${formatFormulaValue(a)} × √x + ${formatFormulaValue(b)}`;
}

function getFormulaHTML(type, a, b, c) {
  if (type === 'linear') {
    return `y = ${renderFormulaParam('a', a)} × x + ${renderFormulaParam('b', b)}`;
  }
  if (type === 'quadratic') {
    return `y = ${renderFormulaParam('a', a)} × x × x + ${renderFormulaParam('b', b)} × x + ${renderFormulaParam('c', c)}`;
  }
  return `y = ${renderFormulaParam('a', a)} × √x + ${renderFormulaParam('b', b)}`;
}

function updateFormulaOverlay() {
  const overlay = document.getElementById('formulaOverlay');
  if (!overlay) return;
  overlay.innerHTML = getFormulaHTML(funcType, paramA, paramB, paramC);
  if (!editingFormulaParam) return;
  const input = document.getElementById('formulaParamInput');
  if (!input) return;
  input.addEventListener('input', e => {
    formulaParamDraft = e.target.value;
  });
  input.addEventListener('keydown', handleFormulaParamInputKeydown);
  input.addEventListener('blur', () => commitFormulaParamEdit(formulaParamDraft));
  requestAnimationFrame(() => {
    input.focus({ preventScroll: true });
    input.select();
  });
}

function handleFormulaOverlayClick(event) {
  const paramEl = event.target.closest('.formula-param');
  if (!paramEl || !formulaOverlay || !formulaOverlay.contains(paramEl)) return;
  if (animating || autoRunning || isCharging) return;
  const paramKey = paramEl.dataset.param;
  if (!paramKey) return;
  editingFormulaParam = paramKey;
  formulaParamDraft = String(getFormulaParamValue(paramKey));
  updateFormulaOverlay();
}

function handleFormulaParamInputKeydown(event) {
  if (event.key === 'Enter') {
    event.preventDefault();
    commitFormulaParamEdit(event.target.value);
  } else if (event.key === 'Escape') {
    event.preventDefault();
    cancelFormulaParamEdit();
  }
}

function cancelFormulaParamEdit() {
  editingFormulaParam = null;
  formulaParamDraft = '';
  updateFormulaOverlay();
}

function syncSettingsInputs() {
  document.getElementById('setType').value = funcType;
  document.getElementById('setA').value = paramA;
  document.getElementById('setB').value = paramB;
  document.getElementById('setC').value = paramC;
  document.getElementById('setNoise').value = noiseLevel;
  document.getElementById('setMax').value = maxTime;
}

function applyFormulaParamChange(paramKey, rawValue) {
  const normalized = Math.round(rawValue * 10) / 10;
  const currentValue = getFormulaParamValue(paramKey);
  if (normalized === currentValue) {
    updateFormulaOverlay();
    return;
  }
  setFormulaParamValue(paramKey, normalized);
  syncSettingsInputs();
  updatePreview();
  cancelAutoFire();
  dataPoints = [];
  nextId = 1;
  hoveredGraphPointId = null;
  selectedTablePointId = null;
  hideGraphTooltip();
  renderDataTable();
  updateFormulaOverlay();
  drawCannon();
  drawGraph();
  document.getElementById('instruction').style.display = '';
}

function commitFormulaParamEdit(rawValue) {
  if (!editingFormulaParam) return;
  const paramKey = editingFormulaParam;
  editingFormulaParam = null;
  formulaParamDraft = '';
  const parsed = parseFloat(rawValue);
  if (!Number.isFinite(parsed)) {
    updateFormulaOverlay();
    return;
  }
  applyFormulaParamChange(paramKey, parsed);
}

// ══════════════ SETTINGS ══════════════
function openSettings() { document.getElementById('settingsModal').classList.add('show'); }
function closeSettings() { document.getElementById('settingsModal').classList.remove('show'); }

function updatePreview() {
  const type = document.getElementById('setType').value;
  const a = parseFloat(document.getElementById('setA').value) || 0;
  const b = parseFloat(document.getElementById('setB').value) || 0;
  const c = parseFloat(document.getElementById('setC').value) || 0;
  document.getElementById('setPreview').textContent = getFormulaText(type, a, b, c);
}

function saveSettings() {
  funcType = document.getElementById('setType').value;
  paramA = parseFloat(document.getElementById('setA').value) || 0;
  paramB = parseFloat(document.getElementById('setB').value) || 0;
  paramC = parseFloat(document.getElementById('setC').value) || 0;
  noiseLevel = parseInt(document.getElementById('setNoise').value) || 0;
  maxTime = Math.min(parseFloat(document.getElementById('setMax').value) || 5, 5);
  renderPowerBarScale();
  cancelAutoFire();
  dataPoints = [];
  nextId = 1;
  hoveredGraphPointId = null;
  selectedTablePointId = null;
  hideGraphTooltip();
  updateFormulaOverlay();
  renderDataTable();
  drawCannon();
  drawGraph();
  closeSettings();
  document.getElementById('instruction').style.display = '';
}

// ══════════════ START ══════════════
init();
</script>
</body>
</html>
