<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>규칙 맞추기 실험실 (Fitting Lab)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0f172a;--panel:#1e293b;--accent:#f59e0b;--accent2:#3b82f6;
  --accent3:#10b981;--danger:#ef4444;--text:#f1f5f9;--muted:#94a3b8;--border:#334155;
}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;height:100vh;overflow:hidden;}
.home-link{position:fixed;top:14px;left:14px;z-index:200;padding:8px 12px;border:1px solid var(--border);border-radius:999px;background:rgba(15,23,42,.82);backdrop-filter:blur(8px);color:var(--text);text-decoration:none;font-size:12px;font-weight:700;}
.home-link:hover{color:var(--accent);border-color:var(--accent);}
.app{display:grid;grid-template-columns:250px 1fr 280px;height:100vh;gap:0;}
.panel{background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.panel:last-child{border-right:none;}
.panel-header{padding:10px 14px;background:rgba(0,0,0,.2);font-family:'Jua',sans-serif;font-size:15px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:space-between;}
.panel-body{padding:12px;flex:1;overflow-y:auto;overflow-x:hidden;}

/* Left panel */
.input-row{display:flex;gap:6px;align-items:center;margin-bottom:10px;flex-wrap:wrap;}
.input-row label{font-size:13px;font-weight:700;min-width:28px;}
.input-row input{width:70px;padding:6px 8px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text);font-size:13px;font-variant-numeric:tabular-nums;text-align:right;}
.input-row input:focus{outline:none;border-color:var(--accent);}
.btn{padding:6px 12px;border:none;border-radius:6px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:700;transition:all .15s;}
.btn-primary{background:var(--accent);color:#000;}
.btn-primary:hover{background:#d97706;}
.btn-danger{background:var(--danger);color:#fff;font-size:11px;padding:4px 8px;}
.btn-danger:hover{background:#dc2626;}
.btn-secondary{background:var(--border);color:var(--text);}
.btn-secondary:hover{background:#475569;}
.btn-sm{padding:2px 6px;font-size:11px;border-radius:4px;}
.data-list{margin-top:8px;}
.data-item{display:flex;align-items:center;justify-content:space-between;padding:5px 8px;margin-bottom:3px;background:var(--bg);border-radius:5px;font-size:12px;font-variant-numeric:tabular-nums;animation:flashIn .4s;}
.data-item .idx{color:var(--muted);margin-right:6px;min-width:20px;}
.data-item .coords{flex:1;}
.data-item .del-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:0 4px;}
.data-item .del-btn:hover{color:var(--danger);}
@keyframes flashIn{0%{background:var(--accent);}100%{background:var(--bg);}}
.clear-row{margin-top:8px;text-align:center;}
.lock-msg{color:var(--muted);font-size:11px;text-align:center;margin-top:8px;}

/* Center panel */
.canvas-wrap{width:100%;height:100%;position:relative;}
#graphCanvas{width:100%;height:100%;display:block;}
.formula-overlay{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.6);padding:5px 14px;border-radius:8px;font-family:'Jua',sans-serif;font-size:14px;color:var(--accent2);pointer-events:none;white-space:nowrap;}
.celebration{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Jua',sans-serif;font-size:42px;color:var(--accent3);text-shadow:0 0 20px rgba(16,185,129,.6);pointer-events:none;animation:celebPop .6s ease-out;display:none;}
@keyframes celebPop{0%{transform:translate(-50%,-50%) scale(0);opacity:0;}50%{transform:translate(-50%,-50%) scale(1.2);opacity:1;}100%{transform:translate(-50%,-50%) scale(1);opacity:1;}}

/* Right panel */
.rule-select{margin-bottom:12px;}
.rule-option{display:flex;align-items:center;gap:8px;padding:8px 10px;margin-bottom:4px;background:var(--bg);border-radius:6px;cursor:pointer;border:2px solid transparent;font-size:12px;transition:border-color .15s;}
.rule-option.active{border-color:var(--accent2);}
.rule-option input[type=radio]{accent-color:var(--accent2);}
.rule-option .formula{font-family:'Jua',sans-serif;color:var(--accent2);}
.param-inputs{margin-bottom:12px;}
.param-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.param-row label{font-size:14px;font-weight:700;min-width:22px;font-family:'Jua',sans-serif;color:var(--accent);}
.param-row input{flex:1;padding:7px 10px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text);font-size:14px;font-variant-numeric:tabular-nums;text-align:right;}
.param-row input:focus{outline:none;border-color:var(--accent);}
.apply-row{margin-bottom:14px;}
.btn-apply{width:100%;padding:10px;font-size:15px;font-family:'Jua',sans-serif;background:var(--accent2);color:#fff;border:none;border-radius:8px;cursor:pointer;transition:background .15s;}
.btn-apply:hover{background:#2563eb;}

.score-box{background:var(--bg);border-radius:10px;padding:12px;margin-bottom:12px;text-align:center;}
.score-value{font-family:'Jua',sans-serif;font-size:32px;transition:color .3s;}
.score-label{font-size:11px;color:var(--muted);margin-bottom:2px;}
.score-row{display:flex;justify-content:space-between;font-size:12px;margin-top:6px;color:var(--muted);}
.feedback{font-size:12px;margin-top:6px;min-height:18px;text-align:center;}

.history-title{font-size:12px;font-weight:700;margin-bottom:6px;color:var(--muted);}
.history-table{width:100%;font-size:11px;border-collapse:collapse;font-variant-numeric:tabular-nums;}
.history-table th{color:var(--muted);font-weight:400;padding:3px 4px;border-bottom:1px solid var(--border);text-align:center;}
.history-table td{padding:3px 4px;text-align:center;}
.history-table tr.best{background:rgba(245,158,11,.15);}
.history-table tr.new-row{animation:flashIn .4s;}
.history-wrap{max-height:140px;overflow-y:auto;margin-bottom:10px;}

.bottom-btns{display:flex;gap:6px;margin-top:auto;padding-top:8px;}

.hint-popup{background:var(--bg);border:1px solid var(--accent);border-radius:8px;padding:10px;margin-top:8px;font-size:12px;color:var(--accent);display:none;}

/* Settings modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:none;align-items:center;justify-content:center;}
.modal-overlay.show{display:flex;}
.modal{background:var(--panel);border-radius:12px;padding:20px;width:340px;max-width:90vw;}
.modal h3{font-family:'Jua',sans-serif;margin-bottom:12px;}
.modal .close-btn{float:right;background:none;border:none;color:var(--text);font-size:20px;cursor:pointer;}

/* Responsive */
@media(max-width:900px){
  .app{grid-template-columns:1fr;height:auto;}
  .panel{border-right:none;border-bottom:1px solid var(--border);}
  .canvas-wrap{height:50vh;}
  body{overflow-y:auto;}
}
</style>
</head>
<body>
<a class="home-link" href="./index.html">← 홈</a>
<div class="app">
  <!-- Left Panel: Data Input -->
  <div class="panel">
    <div class="panel-header">
      <span>📊 데이터 입력</span>
      <button class="btn btn-sm btn-secondary" id="settingsBtn" onclick="openSettings()">⚙️</button>
    </div>
    <div class="panel-body" id="leftBody">
      <div class="input-row" id="inputArea">
        <label>x =</label>
        <input type="number" id="inputX" step="0.1" placeholder="0">
        <label>y =</label>
        <input type="number" id="inputY" step="1" placeholder="0">
        <button class="btn btn-primary" onclick="addPoint()">추가</button>
      </div>
      <div class="data-list" id="dataList"></div>
      <div class="clear-row" id="clearRow">
        <button class="btn btn-danger" onclick="clearAllPoints()">전체 삭제</button>
      </div>
      <div class="lock-msg" id="lockMsg" style="display:none;">🔒 데이터가 잠겨 있습니다</div>
    </div>
  </div>

  <!-- Center Panel: Visualization -->
  <div class="panel" style="border-right:1px solid var(--border);">
    <div class="panel-header"><span>📈 시각화</span></div>
    <div class="panel-body" style="padding:0;">
      <div class="canvas-wrap">
        <canvas id="graphCanvas"></canvas>
        <div class="formula-overlay" id="formulaOverlay" style="display:none;"></div>
        <div class="celebration" id="celebration">🎉 완벽!</div>
      </div>
    </div>
  </div>

  <!-- Right Panel: Rule Adjustment -->
  <div class="panel">
    <div class="panel-header"><span>🔧 규칙 맞추기</span></div>
    <div class="panel-body" style="display:flex;flex-direction:column;">
      <div class="rule-select">
        <div class="rule-option active" id="optLinear" onclick="setMode('linear')">
          <input type="radio" name="mode" checked>
          <span class="formula">직선: y = a × x + b</span>
        </div>
        <div class="rule-option" id="optQuad" onclick="setMode('quadratic')">
          <input type="radio" name="mode">
          <span class="formula">곡선: y = a × x × x + b × x + c</span>
        </div>
      </div>

      <div class="param-inputs">
        <div class="param-row"><label>a</label><input type="number" id="paramA" value="0" step="0.1"></div>
        <div class="param-row"><label>b</label><input type="number" id="paramB" value="0" step="0.1"></div>
        <div class="param-row" id="paramCRow" style="display:none;"><label>c</label><input type="number" id="paramC" value="0" step="0.1"></div>
      </div>

      <div class="apply-row">
        <button class="btn-apply" onclick="applyRule()">적용</button>
      </div>

      <div class="score-box" id="scoreBox" style="display:none;">
        <div class="score-label">오차 합계</div>
        <div class="score-value" id="scoreValue">-</div>
        <div class="score-row">
          <span>최소 오차: <b id="bestScore">-</b></span>
          <span>시행: <b id="trialCount">0</b>회</span>
        </div>
        <div class="feedback" id="feedback"></div>
      </div>

      <div class="history-title">시행 기록</div>
      <div class="history-wrap">
        <table class="history-table">
          <thead><tr><th>#</th><th>a</th><th>b</th><th id="thC" style="display:none;">c</th><th>오차</th></tr></thead>
          <tbody id="historyBody"></tbody>
        </table>
      </div>

      <div class="bottom-btns">
        <button class="btn btn-secondary" style="flex:1;" onclick="resetRule()">초기화</button>
        <button class="btn btn-secondary" style="flex:1;" id="hintBtn" onclick="showHint()">힌트 (3)</button>
      </div>
      <div class="hint-popup" id="hintPopup"></div>
    </div>
  </div>
</div>

<!-- Settings Modal -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <button class="close-btn" onclick="closeSettings()">&times;</button>
    <h3>⚙️ 교사 설정</h3>
    <p style="font-size:12px;color:var(--muted);margin-bottom:10px;">URL 파라미터로 설정을 전달할 수 있습니다.</p>
    <p style="font-size:11px;color:var(--muted);word-break:break-all;">
      ?points=x1,y1,x2,y2,...&mode=linear|quadratic|both&lock_points=true&hide_settings=true
    </p>
  </div>
</div>

<script>
// ══════════════ STATE ══════════════
let points = [];
let currentMode = 'linear'; // 'linear' | 'quadratic'
let allowedModes = 'both'; // 'linear' | 'quadratic' | 'both'
let isLocked = false;
let hasApplied = false;
let currentA = 0, currentB = 0, currentC = 0;
let bestError = Infinity;
let trials = [];
let hintCount = 0;
const MAX_HINTS = 3;

// ══════════════ INIT ══════════════
const canvas = document.getElementById('graphCanvas');
const ctx = canvas.getContext('2d');

function init() {
  parseURL();
  resizeCanvas();
  renderDataList();
  renderCanvas();
  updateModeUI();
  window.addEventListener('resize', () => { resizeCanvas(); renderCanvas(); });

  // Enter key support
  document.getElementById('inputX').addEventListener('keydown', e => { if(e.key==='Enter') addPoint(); });
  document.getElementById('inputY').addEventListener('keydown', e => { if(e.key==='Enter') addPoint(); });
  document.getElementById('paramA').addEventListener('keydown', e => { if(e.key==='Enter') applyRule(); });
  document.getElementById('paramB').addEventListener('keydown', e => { if(e.key==='Enter') applyRule(); });
  document.getElementById('paramC').addEventListener('keydown', e => { if(e.key==='Enter') applyRule(); });
}

function parseURL() {
  const params = new URLSearchParams(location.search);

  // Points
  const pStr = params.get('points');
  if (pStr) {
    const nums = pStr.split(',').map(Number);
    for (let i = 0; i < nums.length - 1; i += 2) {
      if (!isNaN(nums[i]) && !isNaN(nums[i+1])) {
        points.push([nums[i], nums[i+1]]);
      }
    }
  }

  // Mode
  const mode = params.get('mode');
  if (mode === 'linear' || mode === 'quadratic' || mode === 'both') {
    allowedModes = mode;
    if (mode === 'quadratic') { currentMode = 'quadratic'; }
  }
  const initMode = params.get('initial_mode');
  if (initMode === 'quadratic') currentMode = 'quadratic';

  // Lock
  if (params.get('lock_points') === 'true') {
    isLocked = true;
    document.getElementById('inputArea').style.display = 'none';
    document.getElementById('clearRow').style.display = 'none';
    document.getElementById('lockMsg').style.display = 'block';
  }

  // Hide settings
  if (params.get('hide_settings') === 'true') {
    document.getElementById('settingsBtn').style.display = 'none';
  }
}

function resizeCanvas() {
  const wrap = canvas.parentElement;
  const dpr = window.devicePixelRatio || 1;
  canvas.width = wrap.clientWidth * dpr;
  canvas.height = wrap.clientHeight * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

// ══════════════ MODE ══════════════
function setMode(mode) {
  if (allowedModes !== 'both' && mode !== allowedModes) return;
  currentMode = mode;
  updateModeUI();
}

function updateModeUI() {
  const isQ = currentMode === 'quadratic';
  document.getElementById('optLinear').classList.toggle('active', !isQ);
  document.getElementById('optQuad').classList.toggle('active', isQ);
  document.getElementById('optLinear').querySelector('input').checked = !isQ;
  document.getElementById('optQuad').querySelector('input').checked = isQ;
  document.getElementById('paramCRow').style.display = isQ ? 'flex' : 'none';
  document.getElementById('thC').style.display = isQ ? '' : 'none';
  document.querySelectorAll('.history-table .c-cell').forEach(el => el.style.display = isQ ? '' : 'none');

  // Hide unavailable options
  if (allowedModes === 'linear') document.getElementById('optQuad').style.display = 'none';
  if (allowedModes === 'quadratic') document.getElementById('optLinear').style.display = 'none';
}

// ══════════════ DATA ══════════════
function addPoint() {
  if (isLocked) return;
  const x = parseFloat(document.getElementById('inputX').value);
  const y = parseFloat(document.getElementById('inputY').value);
  if (isNaN(x) || isNaN(y)) return;
  points.push([Math.round(x*10)/10, Math.round(y*10)/10]);
  document.getElementById('inputX').value = '';
  document.getElementById('inputY').value = '';
  document.getElementById('inputX').focus();
  renderDataList();
  renderCanvas();
}

function removePoint(idx) {
  if (isLocked) return;
  points.splice(idx, 1);
  renderDataList();
  renderCanvas();
}

function clearAllPoints() {
  if (isLocked) return;
  points = [];
  hasApplied = false;
  renderDataList();
  renderCanvas();
  document.getElementById('formulaOverlay').style.display = 'none';
}

function renderDataList() {
  const list = document.getElementById('dataList');
  list.innerHTML = '';
  points.forEach((p, i) => {
    const div = document.createElement('div');
    div.className = 'data-item';
    div.innerHTML = `<span class="idx">#${i+1}</span><span class="coords">(${p[0]}, ${p[1]})</span>`;
    if (!isLocked) {
      const btn = document.createElement('button');
      btn.className = 'del-btn';
      btn.textContent = '×';
      btn.onclick = () => removePoint(i);
      div.appendChild(btn);
    }
    list.appendChild(div);
  });
}

// ══════════════ AXIS ══════════════
function calcAxisRange() {
  if (points.length === 0) return { xMin: 0, xMax: 10, yMin: 0, yMax: 100 };
  const xs = points.map(p => p[0]);
  const ys = points.map(p => p[1]);
  let xMin = Math.min(...xs), xMax = Math.max(...xs);
  let yMin = Math.min(...ys), yMax = Math.max(...ys);

  // Include curve range if applied
  if (hasApplied) {
    for (let t = xMin; t <= xMax; t += (xMax - xMin) / 50 || 0.1) {
      const v = predict(t);
      if (v < yMin) yMin = v;
      if (v > yMax) yMax = v;
    }
  }

  const xMargin = (xMax - xMin) * 0.12 || 1;
  const yMargin = (yMax - yMin) * 0.12 || 10;
  xMin = Math.min(xMin - xMargin, 0);
  xMax = xMax + xMargin;
  yMin = Math.min(yMin - yMargin, 0);
  yMax = yMax + yMargin;
  return { xMin, xMax, yMin, yMax };
}

function niceStep(range) {
  if (range <= 0) return 1;
  const rough = range / 6;
  const mag = Math.pow(10, Math.floor(Math.log10(rough)));
  const res = rough / mag;
  if (res <= 1.5) return mag;
  if (res <= 3.5) return 2 * mag;
  if (res <= 7.5) return 5 * mag;
  return 10 * mag;
}

// ══════════════ PREDICT ══════════════
function predict(x) {
  if (currentMode === 'linear') return currentA * x + currentB;
  return currentA * x * x + currentB * x + currentC;
}

// ══════════════ CANVAS ══════════════
function renderCanvas() {
  const W = canvas.width / (window.devicePixelRatio || 1);
  const H = canvas.height / (window.devicePixelRatio || 1);
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = var_panel();
  ctx.fillRect(0, 0, W, H);

  if (points.length === 0 && !hasApplied) {
    ctx.fillStyle = '#94a3b8';
    ctx.font = '14px "Noto Sans KR"';
    ctx.textAlign = 'center';
    ctx.fillText('왼쪽에서 데이터를 추가하세요', W/2, H/2);
    return;
  }

  const pad = { top: 30, right: 30, bottom: 40, left: 55 };
  const { xMin, xMax, yMin, yMax } = calcAxisRange();
  const plotW = W - pad.left - pad.right;
  const plotH = H - pad.top - pad.bottom;

  function toX(v) { return pad.left + (v - xMin) / (xMax - xMin) * plotW; }
  function toY(v) { return pad.top + plotH - (v - yMin) / (yMax - yMin) * plotH; }

  // Grid
  ctx.strokeStyle = '#1e293b';
  ctx.lineWidth = 1;
  const xStep = niceStep(xMax - xMin);
  const yStep = niceStep(yMax - yMin);
  ctx.font = '10px "Noto Sans KR"';
  ctx.fillStyle = '#64748b';
  ctx.textAlign = 'center';

  for (let v = Math.ceil(xMin / xStep) * xStep; v <= xMax; v += xStep) {
    const px = toX(v);
    ctx.beginPath(); ctx.moveTo(px, pad.top); ctx.lineTo(px, pad.top + plotH); ctx.stroke();
    ctx.fillText(formatNum(v), px, pad.top + plotH + 14);
  }
  ctx.textAlign = 'right';
  for (let v = Math.ceil(yMin / yStep) * yStep; v <= yMax; v += yStep) {
    const py = toY(v);
    ctx.beginPath(); ctx.moveTo(pad.left, py); ctx.lineTo(pad.left + plotW, py); ctx.stroke();
    ctx.fillText(formatNum(v), pad.left - 6, py + 4);
  }

  // Axes
  ctx.strokeStyle = '#475569';
  ctx.lineWidth = 1.5;
  // X axis at y=0
  if (yMin <= 0 && yMax >= 0) {
    const y0 = toY(0);
    ctx.beginPath(); ctx.moveTo(pad.left, y0); ctx.lineTo(pad.left + plotW, y0); ctx.stroke();
  }
  // Y axis at x=0
  if (xMin <= 0 && xMax >= 0) {
    const x0 = toX(0);
    ctx.beginPath(); ctx.moveTo(x0, pad.top); ctx.lineTo(x0, pad.top + plotH); ctx.stroke();
  }

  // Axis labels
  ctx.fillStyle = '#94a3b8';
  ctx.font = '12px "Noto Sans KR"';
  ctx.textAlign = 'center';
  ctx.fillText('x', pad.left + plotW / 2, H - 4);
  ctx.save();
  ctx.translate(12, pad.top + plotH / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.fillText('y', 0, 0);
  ctx.restore();

  // Curve/line (if applied)
  if (hasApplied) {
    ctx.strokeStyle = '#3b82f6';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    const steps = 200;
    for (let i = 0; i <= steps; i++) {
      const x = xMin + (xMax - xMin) * i / steps;
      const y = predict(x);
      const px = toX(x), py = toY(y);
      if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    }
    ctx.stroke();

    // Error lines
    const yRange = yMax - yMin;
    points.forEach(([px, py]) => {
      const pred = predict(px);
      const err = Math.abs(pred - py);
      const ratio = err / (yRange || 1);

      if (ratio >= 0.001) {
        const ec = getErrorColor(ratio);
        ctx.strokeStyle = ec.color;
        ctx.lineWidth = ec.width;
        ctx.setLineDash([4, 3]);
        ctx.beginPath();
        ctx.moveTo(toX(px), toY(py));
        ctx.lineTo(toX(px), toY(pred));
        ctx.stroke();
        ctx.setLineDash([]);

        // Error value label
        ctx.fillStyle = ec.color;
        ctx.font = '10px "Noto Sans KR"';
        ctx.textAlign = 'left';
        const midY = (toY(py) + toY(pred)) / 2;
        ctx.fillText(formatNum(err), toX(px) + 6, midY + 3);
      }
    });
  }

  // Data points
  const yRange = (yMax - yMin) || 1;
  points.forEach(([px, py]) => {
    const cx = toX(px), cy = toY(py);
    let isMatch = false;
    if (hasApplied) {
      const pred = predict(px);
      const err = Math.abs(pred - py);
      isMatch = (err / yRange) < 0.001;
    }
    // Circle
    ctx.beginPath();
    ctx.arc(cx, cy, 6, 0, Math.PI * 2);
    ctx.fillStyle = isMatch ? '#10b981' : '#ef4444';
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Check mark
    if (isMatch) {
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(cx - 3, cy);
      ctx.lineTo(cx - 1, cy + 3);
      ctx.lineTo(cx + 4, cy - 3);
      ctx.stroke();
    }

    // Coordinate label
    ctx.fillStyle = '#94a3b8';
    ctx.font = '10px "Noto Sans KR"';
    ctx.textAlign = 'left';
    ctx.fillText(`(${px}, ${py})`, cx + 9, cy - 2);
  });
}

function var_panel() { return '#1e293b'; }

function getErrorColor(ratio) {
  if (ratio < 0.03) return { color: '#10b981', width: 1 };
  if (ratio < 0.10) return { color: '#f59e0b', width: 1.5 };
  return { color: '#ef4444', width: 2 };
}

function formatNum(v) {
  if (Number.isInteger(v)) return v.toString();
  const s = v.toFixed(1);
  if (Math.abs(v) >= 1000) return Math.round(v).toString();
  return s;
}

// ══════════════ APPLY RULE ══════════════
function applyRule() {
  if (points.length === 0) return;

  currentA = parseFloat(document.getElementById('paramA').value) || 0;
  currentB = parseFloat(document.getElementById('paramB').value) || 0;
  currentC = currentMode === 'quadratic' ? (parseFloat(document.getElementById('paramC').value) || 0) : 0;
  hasApplied = true;

  // Calculate error
  let totalError = 0;
  points.forEach(([px, py]) => {
    totalError += Math.abs(predict(px) - py);
  });
  totalError = Math.round(totalError * 100) / 100;

  // Update best
  if (totalError < bestError) bestError = totalError;

  // Trial record
  const trial = { a: currentA, b: currentB, c: currentC, error: totalError };
  trials.push(trial);

  // Update UI
  document.getElementById('scoreBox').style.display = 'block';
  const scoreEl = document.getElementById('scoreValue');
  scoreEl.textContent = totalError;
  scoreEl.style.color = totalError === 0 ? '#10b981' : totalError < (getYRange() * 0.05) ? '#f59e0b' : '#ef4444';

  document.getElementById('bestScore').textContent = bestError;
  document.getElementById('trialCount').textContent = trials.length;

  // Feedback
  const fb = document.getElementById('feedback');
  if (totalError === 0) {
    fb.textContent = '🎉 완벽! 모든 점을 정확히 지나갑니다!';
    fb.style.color = '#10b981';
    showCelebration();
  } else if (totalError < getYRange() * 0.02) {
    fb.textContent = '거의 다 맞았어요! 조금만 더!';
    fb.style.color = '#f59e0b';
  } else if (totalError < getYRange() * 0.1) {
    fb.textContent = '좋아요! 점점 가까워지고 있어요.';
    fb.style.color = '#f59e0b';
  } else if (totalError < getYRange() * 0.3) {
    fb.textContent = '나쁘지 않아요. 어떤 숫자를 바꿔볼까요?';
    fb.style.color = '#94a3b8';
  } else {
    fb.textContent = '아직 멀었어요. a부터 조절해보세요!';
    fb.style.color = '#ef4444';
  }

  // Formula overlay
  const overlay = document.getElementById('formulaOverlay');
  overlay.style.display = 'block';
  if (currentMode === 'linear') {
    overlay.textContent = `y = ${currentA} × x + ${currentB}`;
  } else {
    overlay.textContent = `y = ${currentA} × x × x + ${currentB} × x + ${currentC}`;
  }

  renderHistory();
  renderCanvas();
}

function getYRange() {
  if (points.length === 0) return 1;
  const ys = points.map(p => p[1]);
  return (Math.max(...ys) - Math.min(...ys)) || 1;
}

function showCelebration() {
  const el = document.getElementById('celebration');
  el.style.display = 'block';
  el.style.animation = 'none';
  void el.offsetWidth;
  el.style.animation = 'celebPop .6s ease-out';
  setTimeout(() => { el.style.display = 'none'; }, 2500);
}

// ══════════════ HISTORY ══════════════
function renderHistory() {
  const body = document.getElementById('historyBody');
  body.innerHTML = '';
  const isQ = currentMode === 'quadratic';
  trials.forEach((t, i) => {
    const tr = document.createElement('tr');
    if (t.error === bestError) tr.className = 'best';
    if (i === trials.length - 1) tr.className += ' new-row';
    tr.innerHTML = `<td>${i+1}</td><td>${t.a}</td><td>${t.b}</td>` +
      (isQ ? `<td class="c-cell">${t.c}</td>` : '') +
      `<td>${t.error}${t.error === bestError ? ' ⭐' : ''}</td>`;
    body.appendChild(tr);
  });
  // Scroll to bottom
  const wrap = body.closest('.history-wrap');
  if (wrap) wrap.scrollTop = wrap.scrollHeight;
}

// ══════════════ RESET ══════════════
function resetRule() {
  document.getElementById('paramA').value = 0;
  document.getElementById('paramB').value = 0;
  document.getElementById('paramC').value = 0;
  currentA = 0; currentB = 0; currentC = 0;
  hasApplied = false;
  bestError = Infinity;
  trials = [];
  hintCount = 0;
  document.getElementById('hintBtn').textContent = `힌트 (${MAX_HINTS})`;
  document.getElementById('hintBtn').disabled = false;
  document.getElementById('hintPopup').style.display = 'none';
  document.getElementById('scoreBox').style.display = 'none';
  document.getElementById('formulaOverlay').style.display = 'none';
  document.getElementById('historyBody').innerHTML = '';
  document.getElementById('celebration').style.display = 'none';
  renderCanvas();
}

// ══════════════ HINT ══════════════
function showHint() {
  if (hintCount >= MAX_HINTS || points.length === 0) return;
  hintCount++;
  document.getElementById('hintBtn').textContent = `힌트 (${MAX_HINTS - hintCount})`;
  if (hintCount >= MAX_HINTS) document.getElementById('hintBtn').disabled = true;

  const popup = document.getElementById('hintPopup');
  popup.style.display = 'block';

  // Find ideal values for hint direction
  let idealA = 0;
  if (points.length >= 2) {
    const [x1, y1] = points[0];
    const [x2, y2] = points[points.length - 1];
    if (x2 !== x1) idealA = (y2 - y1) / (x2 - x1);
  }

  if (currentMode === 'linear') {
    if (hintCount === 1) {
      popup.textContent = '💡 a는 선의 기울기예요. x가 1 늘 때 y가 얼마 느는지 생각해보세요.';
    } else if (hintCount === 2) {
      popup.textContent = '💡 b는 x = 0일 때의 y값이에요. 데이터에서 x = 0인 점을 보세요.';
    } else {
      const dir = idealA > currentA ? '크게' : '작게';
      popup.textContent = `💡 a를 지금보다 ${dir} 해보세요.`;
    }
  } else {
    if (hintCount === 1) {
      popup.textContent = '💡 a는 곡선이 얼마나 휘어지는지를 결정해요.';
    } else if (hintCount === 2) {
      popup.textContent = '💡 c는 x = 0일 때의 y값이에요.';
    } else {
      const dir = idealA > currentA ? '크게' : '작게';
      popup.textContent = `💡 a를 지금보다 ${dir} 해보세요.`;
    }
  }
}

// ══════════════ SETTINGS ══════════════
function openSettings() { document.getElementById('settingsModal').classList.add('show'); }
function closeSettings() { document.getElementById('settingsModal').classList.remove('show'); }

// ══════════════ START ══════════════
init();
</script>
