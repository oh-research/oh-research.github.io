<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오차와 추세선 — 4차시</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0f172a;--panel:#1e293b;--accent:#f59e0b;--accent2:#3b82f6;
  --accent3:#10b981;--danger:#ef4444;--text:#f1f5f9;--muted:#94a3b8;--border:#334155;
}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;}
html,body{height:100%;}

/* ── TAB BAR ── */
.tab-bar{display:flex;align-items:center;gap:6px;padding:10px 16px;background:var(--bg);border-bottom:2px solid var(--border);flex-shrink:0;}
.tab-bar-title{font-family:'Jua',sans-serif;font-size:17px;color:var(--accent);margin-right:10px;white-space:nowrap;}
.tab-btn{font-family:'Jua',sans-serif;font-size:17px;padding:10px 28px;border:2px solid var(--border);border-radius:10px;cursor:pointer;background:var(--panel);color:var(--muted);transition:all .2s;}
.tab-btn.active{background:var(--accent);color:#000;border-color:var(--accent);}
.tab-btn:hover:not(.active){background:#293548;color:var(--text);}

/* ── MAIN LAYOUT ── */
.main{display:flex;flex:1;overflow:hidden;height:calc(100vh - 52px);}

/* ── LEFT PANEL ── */
.left-panel{width:300px;min-width:280px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0;}
.panel-header{padding:12px 16px;background:rgba(0,0,0,.25);font-family:'Jua',sans-serif;font-size:15px;border-bottom:1px solid var(--border);flex-shrink:0;}
.panel-body{padding:14px;flex:1;}

/* Point display */
.point-display{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
.point-badge{background:var(--bg);border:2px solid var(--border);border-radius:10px;padding:10px 14px;text-align:center;flex:1;min-width:70px;}
.point-badge .label{font-family:'Jua',sans-serif;font-size:22px;color:var(--accent);}
.point-badge .coord{font-family:'Jua',sans-serif;font-size:16px;color:var(--text);margin-top:4px;}

/* Point input */
.point-input-group{margin-bottom:14px;}
.point-input-group label{font-size:13px;color:var(--muted);display:block;margin-bottom:6px;}
.point-input-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;}
.point-input-row .pt-label{font-family:'Jua',sans-serif;font-size:20px;color:var(--accent);min-width:26px;}
.point-input-row input{width:68px;padding:8px 10px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text);font-family:'Jua',sans-serif;font-size:20px;text-align:center;font-variant-numeric:tabular-nums;}
.point-input-row input:focus{outline:none;border-color:var(--accent);}
.point-input-row span{color:var(--accent2);font-family:'Jua',sans-serif;font-size:17px;}

/* Combo buttons */
.combo-section{margin-bottom:16px;}
.combo-section .section-title{font-size:13px;color:var(--muted);margin-bottom:8px;}
.combo-btn{width:100%;padding:12px;font-family:'Jua',sans-serif;font-size:16px;border:2px solid var(--border);border-radius:10px;background:var(--bg);color:var(--text);cursor:pointer;margin-bottom:8px;transition:all .15s;text-align:left;}
.combo-btn:hover{border-color:var(--accent2);background:#162033;}
.combo-btn.active{border-color:var(--accent2);background:rgba(59,130,246,.15);color:var(--accent2);}

/* Anim controls */
.anim-controls{display:flex;flex-direction:column;gap:10px;}
.anim-btn{width:100%;padding:14px;font-family:'Jua',sans-serif;font-size:18px;border:none;border-radius:10px;cursor:pointer;transition:all .15s;}
.anim-btn-start{background:var(--accent3);color:#000;}
.anim-btn-start:hover{background:#059669;}
.anim-btn-replay{background:var(--accent2);color:#fff;}
.anim-btn-replay:hover{background:#2563eb;}
.anim-btn-slow{background:var(--border);color:var(--text);}
.anim-btn-slow:hover{background:#475569;}
.anim-btn:disabled{opacity:0.4;cursor:not-allowed;}

/* ── RIGHT AREA ── */
.right-area{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.canvas-wrap{flex:1;position:relative;min-height:0;}
#graphCanvas{width:100%;height:100%;display:block;touch-action:none;}

/* ── BOTTOM AREA ── */
.bottom-area{background:var(--panel);border-top:1px solid var(--border);flex-shrink:0;overflow-y:auto;max-height:50vh;}

/* Calc display (Tab 1) */
.calc-display{padding:16px 20px;}
.calc-step{margin-bottom:12px;padding:12px 16px;background:var(--bg);border-radius:8px;border-left:3px solid var(--border);}
.calc-step.highlight{border-left-color:var(--accent);}
.calc-step .step-num{font-family:'Jua',sans-serif;font-size:14px;color:var(--accent);margin-bottom:4px;}
.calc-step .step-content{font-size:14px;line-height:1.7;font-family:'Jua',sans-serif;}
.calc-step .step-content .val{color:var(--accent2);}
.calc-step .step-content .result{color:var(--accent3);font-size:16px;}
.calc-step .step-content .error-val{color:var(--danger);font-size:16px;}

/* Comparison table */
.comparison-table-wrap{padding:0 20px 16px;}
.comparison-title{font-family:'Jua',sans-serif;font-size:15px;color:var(--muted);margin-bottom:10px;}
table.comp{width:100%;border-collapse:collapse;font-size:14px;}
table.comp th{background:var(--bg);color:var(--muted);padding:8px 12px;text-align:center;font-weight:400;font-size:13px;border:1px solid var(--border);}
table.comp td{padding:8px 12px;text-align:center;border:1px solid var(--border);font-family:'Jua',sans-serif;}
table.comp tr.best-row td{background:rgba(16,185,129,.2);color:var(--accent3);}
table.comp tr.current-row td{background:rgba(59,130,246,.15);color:var(--accent2);}
.question-box{margin:10px 20px 16px;padding:12px 16px;background:rgba(245,158,11,.1);border:2px solid var(--accent);border-radius:10px;font-family:'Jua',sans-serif;font-size:16px;color:var(--accent);text-align:center;}

/* ── ANIMATION DISPLAY (Tab 2) ── */
.anim-display{padding:16px 20px;display:flex;flex-direction:column;align-items:center;}
.error-sum-box{text-align:center;margin-bottom:14px;width:100%;}
.error-sum-label{font-size:16px;color:var(--muted);margin-bottom:6px;font-family:'Jua',sans-serif;}
.error-sum-value{font-family:'Jua',sans-serif;font-size:72px;font-weight:bold;letter-spacing:2px;transition:color .2s;line-height:1;}
.current-formula{font-family:'Jua',sans-serif;font-size:18px;color:var(--muted);margin-top:4px;}
.result-box{display:none;padding:14px 20px;background:rgba(16,185,129,.1);border:2px solid var(--accent3);border-radius:12px;text-align:center;margin-top:10px;width:100%;}
.result-box .result-title{font-family:'Jua',sans-serif;font-size:22px;color:var(--accent3);margin-bottom:8px;}
.result-box .result-formula{font-family:'Jua',sans-serif;font-size:18px;color:var(--text);margin-bottom:10px;}
.result-compare{margin-top:10px;overflow-x:auto;}
table.res-comp{width:100%;border-collapse:collapse;font-size:13px;}
table.res-comp th{background:var(--bg);color:var(--muted);padding:7px 10px;text-align:center;font-weight:400;border:1px solid var(--border);}
table.res-comp td{padding:7px 10px;text-align:center;border:1px solid var(--border);font-family:'Jua',sans-serif;}
table.res-comp tr.trend-row td{background:rgba(16,185,129,.2);color:var(--accent3);}

/* Flash effect */
@keyframes flashGreen{0%{box-shadow:0 0 0 0 rgba(16,185,129,.8);}70%{box-shadow:0 0 0 20px rgba(16,185,129,0);}100%{box-shadow:0 0 0 0 rgba(16,185,129,0);}}
.flash-anim{animation:flashGreen 0.8s ease-out;}

/* Placeholder */
.placeholder{padding:24px;text-align:center;color:var(--muted);font-size:14px;}

/* Dynamic point rows */
.point-row-dynamic{display:flex;gap:8px;align-items:center;margin-bottom:8px;}
.point-row-dynamic .pt-label{font-family:'Jua',sans-serif;font-size:20px;min-width:26px;}
.point-row-dynamic input{width:68px;padding:8px 10px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text);font-family:'Jua',sans-serif;font-size:20px;text-align:center;font-variant-numeric:tabular-nums;}
.point-row-dynamic input:focus{outline:none;border-color:var(--accent);}
.point-row-dynamic span{color:var(--accent2);font-family:'Jua',sans-serif;font-size:17px;}
.btn-delete-pt{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:2px 6px;}
.btn-delete-pt:hover{color:var(--danger);}
.btn-add-pt{width:100%;padding:10px;font-family:'Jua',sans-serif;font-size:15px;border:2px dashed var(--border);border-radius:10px;background:transparent;color:var(--muted);cursor:pointer;margin-top:8px;transition:all .15s;}
.btn-add-pt:hover{border-color:var(--accent);color:var(--accent);}
.selected-info{font-family:'Jua',sans-serif;font-size:14px;color:var(--muted);padding:10px;background:var(--bg);border-radius:8px;text-align:center;min-height:40px;display:flex;align-items:center;justify-content:center;gap:6px;}
.select-section{margin-bottom:16px;}
.select-section .section-title{font-size:13px;color:var(--muted);margin-bottom:8px;}

/* Responsive */
@media(max-width:768px){
  .main{flex-direction:column;height:auto;overflow:auto;}
  .left-panel{width:100%;min-width:auto;height:auto;border-right:none;border-bottom:1px solid var(--border);}
  .right-area{height:320px;flex:none;}
  .canvas-wrap{height:320px;flex:none;}
  .bottom-area{max-height:none;}
  .error-sum-value{font-size:56px;}
  .tab-btn{font-size:15px;padding:8px 18px;}
}
</style>
</head>
<body>

<!-- Tab bar -->
<div class="tab-bar">
  <span class="tab-bar-title">오차와 추세선 — 4차시</span>
  <button class="tab-btn active" id="tab4Btn" onclick="switchTab(4)">4단계</button>
  <button class="tab-btn" id="tab5Btn" onclick="switchTab(5)">5단계</button>
  <a href="./index.html" style="margin-left:auto;padding:8px 18px;border-radius:999px;background:#f59e0b;color:#111827;font-family:'Jua',sans-serif;font-size:14px;text-decoration:none;white-space:nowrap;">홈으로</a>
</div>

<!-- Main layout -->
<div class="main">

  <!-- Left panel -->
  <div class="left-panel">

    <!-- TAB 4 controls -->
    <div id="panel4">
      <div class="panel-header">직선 위에 없는 점과 오차</div>
      <div class="panel-body">

        <div class="point-input-group">
          <label>점을 입력하세요</label>
          <div id="pointInputs"></div>
        </div>

        <div class="select-section">
          <button class="combo-btn" id="btnDrawLine" onclick="enterSelectMode()">📐 직선 긋기</button>
          <div class="selected-info" id="selectedInfo" style="display:none;"></div>
        </div>

      </div>
    </div>

    <!-- TAB 5 controls -->
    <div id="panel5" style="display:none;">
      <div class="panel-header">추세선 — 오차² 합이 가장 작은 직선</div>
      <div class="panel-body">
        <p style="font-size:13px;color:var(--muted);margin-bottom:14px;line-height:1.6;">
          세로 거리는 +일 수도, −일 수도 있어서<br>
          그냥 더하면 서로 상쇄됩니다.<br>
          그래서 각 거리를 <strong style="color:var(--accent);">제곱</strong>하여 음수를 없앤 뒤<br>
          <strong style="color:var(--accent3);">제곱 합이 가장 작은 직선</strong>을 찾습니다.
        </p>

        <div class="point-display" id="pt5Display"></div>

        <div class="anim-controls">
          <button class="anim-btn anim-btn-start" id="btnStart" onclick="startAnimation(false)">▶ 추세선 찾기 시작</button>
          <button class="anim-btn anim-btn-replay" id="btnReplay" onclick="startAnimation(false)" disabled>↺ 다시 보기</button>
          <button class="anim-btn anim-btn-slow" id="btnSlow" onclick="startAnimation(true)">🐢 천천히 보기</button>
        </div>
      </div>
    </div>

  </div><!-- end left-panel -->

  <!-- Right area -->
  <div class="right-area">
    <div class="canvas-wrap">
      <canvas id="graphCanvas"></canvas>
    </div>

    <!-- Bottom area -->
    <div class="bottom-area" id="bottomArea">

      <!-- Tab 4 bottom -->
      <div id="bottom4">
        <div class="calc-display" id="calcDisplay">
          <div class="placeholder">그래프에서 두 점을 클릭하면 계산 과정이 나타납니다.</div>
        </div>
        <div class="comparison-table-wrap" id="compTableWrap" style="display:none;"></div>
      </div>

      <!-- Tab 5 bottom -->
      <div id="bottom5" style="display:none;">
        <div class="anim-display">
          <div class="error-sum-box" id="errorSumBox" style="display:none;">
            <div class="error-sum-label">오차² 합 (세로 거리² 의 합계)</div>
            <div class="error-sum-value" id="errorSumValue">0.00</div>
            <div class="current-formula" id="currentFormulaDisplay"></div>
          </div>
          <div class="result-box" id="resultBox">
            <div class="result-title">🎉 이것이 추세선!</div>
            <div class="result-formula" id="resultFormula"></div>
            <div class="result-compare" id="resultCompare"></div>
          </div>
          <div class="placeholder" id="animPlaceholder">버튼을 눌러 추세선을 찾아보세요!</div>
        </div>
      </div>

    </div><!-- end bottom-area -->
  </div><!-- end right-area -->

</div><!-- end main -->

<script>
// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
let currentTab = 4;

// Dynamic points array (3-5 points, max 5)
let points = [
  { x: 1, y: 3 },
  { x: 3, y: 8 },
  { x: 5, y: 10 }
];

// Click-to-select
let selectMode = false;     // true when "직선 긋기" button was clicked
let selectedPair = [];      // array of 0-2 point indices

// Tried pairs for comparison table: [{i1, i2, label, a, b, totalErr}]
let triedPairs = [];

// Animation state
let animId = null;
let animStartTime = null;
let animDuration = 5000;
let animStartA, animStartB;
let animOptA, animOptB;
let animSlow = false;

const canvas = document.getElementById('graphCanvas');
const ctx = canvas.getContext('2d');

// Drag state
let dragIdx = -1;
let lastGrid = null;

// Click vs drag detection
let dragStartPos = null;
let dragMoved = false;

// Point labels and colors
const POINT_LABELS = ['A', 'B', 'C', 'D', 'E'];
const POINT_COLORS = ['#f59e0b', '#3b82f6', '#10b981', '#a78bfa', '#f472b6'];

// ══════════════════════════════════════════
// POINT INPUT RENDERING
// ══════════════════════════════════════════
function renderPointInputs() {
  const container = document.getElementById('pointInputs');
  let html = '';
  points.forEach((pt, i) => {
    const label = POINT_LABELS[i];
    const color = POINT_COLORS[i];
    const canDelete = i >= 3; // only D, E can be deleted
    const deleteBtn = canDelete
      ? `<button class="btn-delete-pt" onclick="deletePoint(${i})" title="점 ${label} 삭제">✕</button>`
      : '';
    html += `
      <div class="point-row-dynamic">
        <span class="pt-label" style="color:${color}">${label}</span>
        <span>(</span>
        <input type="number" id="px_${i}" value="${pt.x}" step="0.5"
               oninput="onPointInputChange(${i})">
        <span>,</span>
        <input type="number" id="py_${i}" value="${pt.y}" step="0.5"
               oninput="onPointInputChange(${i})">
        <span>)</span>
        ${deleteBtn}
      </div>`;
  });

  // Add point button (visible when < 5 points)
  if (points.length < 5) {
    html += `<button class="btn-add-pt" onclick="addPoint()">+ 점 추가</button>`;
  }
  container.innerHTML = html;
}

function onPointInputChange(i) {
  const x = parseFloat(document.getElementById('px_' + i).value);
  const y = parseFloat(document.getElementById('py_' + i).value);
  if (!isNaN(x)) points[i].x = x;
  if (!isNaN(y)) points[i].y = y;
  onPointsChanged();
}

function onPointsChanged() {
  selectMode = false;
  selectedPair = [];
  triedPairs = [];
  exitSelectMode();
  showCalcPlaceholder();
  hideCompTable();
  redraw();
}

function addPoint() {
  if (points.length >= 5) return;
  // Default new point slightly offset from last
  const last = points[points.length - 1];
  points.push({ x: last.x + 2, y: last.y + 2 });
  selectedPair = [];
  triedPairs = [];
  renderPointInputs();
  updateSelectedInfo();
  showCalcPlaceholder();
  hideCompTable();
  redraw();
}

function deletePoint(i) {
  if (i < 3 || points.length <= 3) return; // cannot delete A/B/C or go below 3
  points.splice(i, 1);
  selectedPair = [];
  triedPairs = [];
  renderPointInputs();
  updateSelectedInfo();
  showCalcPlaceholder();
  hideCompTable();
  redraw();
}

// ══════════════════════════════════════════
// SELECTION STATE
// ══════════════════════════════════════════
function enterSelectMode() {
  selectMode = true;
  selectedPair = [];
  const info = document.getElementById('selectedInfo');
  info.style.display = '';
  info.innerHTML = '첫 번째 점을 클릭하세요';
  document.getElementById('btnDrawLine').classList.add('active');
  redraw();
}

function exitSelectMode() {
  selectMode = false;
  document.getElementById('selectedInfo').style.display = 'none';
  document.getElementById('btnDrawLine').classList.remove('active');
}

function updateSelectedInfo() {
  const el = document.getElementById('selectedInfo');
  if (!el || !selectMode) return;

  if (selectedPair.length === 0) {
    el.innerHTML = '첫 번째 점을 클릭하세요';
    return;
  }

  if (selectedPair.length === 1) {
    const idx = selectedPair[0];
    const label = POINT_LABELS[idx];
    const color = POINT_COLORS[idx];
    el.innerHTML = `<span style="color:${color};font-weight:bold;">점 ${label}</span> 선택됨 — 두 번째 점을 클릭하세요`;
    return;
  }

  // Two points selected
  const i1 = selectedPair[0], i2 = selectedPair[1];
  const l1 = POINT_LABELS[i1], l2 = POINT_LABELS[i2];
  const c1 = POINT_COLORS[i1], c2 = POINT_COLORS[i2];
  el.innerHTML = `<span style="color:${c1};font-weight:bold;">점 ${l1}</span>–<span style="color:${c2};font-weight:bold;">점 ${l2}</span> 직선`;
}

function handlePointClick(idx) {
  if (!selectMode) return;  // ignore clicks when not in select mode

  // If already selected, deselect
  if (selectedPair.includes(idx)) {
    selectedPair = selectedPair.filter(i => i !== idx);
    updateSelectedInfo();
    redraw();
    return;
  }

  // If 2 already selected, start fresh with clicked point
  if (selectedPair.length >= 2) {
    selectedPair = [idx];
    updateSelectedInfo();
    redraw();
    return;
  }

  selectedPair.push(idx);
  updateSelectedInfo();

  if (selectedPair.length === 2) {
    computeAndShowPair(selectedPair[0], selectedPair[1]);
  }

  redraw();
}

function computeAndShowPair(i1, i2) {
  const p1 = points[i1];
  const p2 = points[i2];
  const line = calcLine(p1, p2);

  if (!line) {
    document.getElementById('calcDisplay').innerHTML =
      '<div class="placeholder">두 점의 x값이 같아 직선을 그을 수 없습니다.</div>';
    return;
  }

  const label = POINT_LABELS[i1] + '\u2013' + POINT_LABELS[i2];
  const sqErr = calcSquaredError(line, points);

  // Record in triedPairs (update if same pair already tried)
  const existIdx = triedPairs.findIndex(p =>
    (p.i1 === i1 && p.i2 === i2) || (p.i1 === i2 && p.i2 === i1));
  if (existIdx >= 0) {
    triedPairs[existIdx] = { i1, i2, label, a: line.a, b: line.b, sqErr };
  } else {
    triedPairs.push({ i1, i2, label, a: line.a, b: line.b, sqErr });
  }

  // Remaining points (not the two selected)
  const remainingPts = points.map((pt, i) => ({ pt, idx: i }))
    .filter(({ idx }) => idx !== i1 && idx !== i2);

  showCalc(i1, i2, p1, p2, line, remainingPts);
  updateCompTable();
  exitSelectMode();
  redraw();
}

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
function init() {
  parseURL();
  renderPointInputs();
  updateSelectedInfo();
  resizeCanvas();
  window.addEventListener('resize', () => { resizeCanvas(); redraw(); });

  // Drag/click support (mouse)
  canvas.addEventListener('mousedown', onDragStart);
  canvas.addEventListener('mousemove', onDragMove);
  canvas.addEventListener('mouseup', onDragEnd);
  canvas.addEventListener('mouseleave', onDragEnd);
  // Drag/click support (touch)
  canvas.addEventListener('touchstart', onTouchStart, { passive: false });
  canvas.addEventListener('touchmove', onTouchMove, { passive: false });
  canvas.addEventListener('touchend', onTouchEnd);
  canvas.addEventListener('touchcancel', onDragEnd);

  switchTab(currentTab);
}

function parseURL() {
  const params = new URLSearchParams(location.search);
  const step = parseInt(params.get('step'));
  if (step === 4 || step === 5) currentTab = step;

  const pStr = params.get('points');
  if (pStr) {
    const nums = pStr.split(',').map(Number);
    // Needs at least 6 numbers (3 points), max 10 (5 points)
    if (nums.length >= 6 && nums.every(n => !isNaN(n))) {
      const count = Math.min(Math.floor(nums.length / 2), 5);
      points = [];
      for (let i = 0; i < count; i++) {
        points.push({ x: nums[i * 2], y: nums[i * 2 + 1] });
      }
    }
  }
}

// ══════════════════════════════════════════
// TABS
// ══════════════════════════════════════════
function switchTab(n) {
  currentTab = n;
  document.getElementById('tab4Btn').classList.toggle('active', n === 4);
  document.getElementById('tab5Btn').classList.toggle('active', n === 5);
  document.getElementById('panel4').style.display = n === 4 ? '' : 'none';
  document.getElementById('panel5').style.display = n === 5 ? '' : 'none';
  document.getElementById('bottom4').style.display = n === 4 ? '' : 'none';

  if (n === 5) {

        <div class="coord" id="pt5_${i}">(${fmt(pt.x)}, ${fmt(pt.y)})</div>
      </div>`;

  // Stop any ongoing animation

}

// ══════════════════════════════════════════
// POINTS ACCESS
// ══════════════════════════════════════════
function getAllPoints() {
  return points;
}

// ══════════════════════════════════════════
// AXIS HELPERS
// ══════════════════════════════════════════
function calcAxisRange(pts, extraA, extraB) {
  if (!pts || pts.length === 0) return { xMin: 0, xMax: 10, yMin: 0, yMax: 10 };
  const xs = pts.map(p => p.x);
  const ys = pts.map(p => p.y);
  let xMin = Math.min(...xs), xMax = Math.max(...xs);
  let yMin = Math.min(...ys), yMax = Math.max(...ys);

  if (extraA !== undefined) {
    for (let t = xMin; t <= xMax; t += (xMax - xMin) / 30 || 0.1) {
      const v = extraA * t + extraB;
      if (v < yMin) yMin = v;
      if (v > yMax) yMax = v;
    }
  }

  const xMg = Math.max((xMax - xMin) * 0.15, 1);
  const yMg = Math.max((yMax - yMin) * 0.18, 1);
  xMin = Math.min(xMin - xMg, 0);
  xMax = xMax + xMg;
  yMin = Math.min(yMin - yMg, 0);
  yMax = yMax + yMg;
  return { xMin, xMax, yMin, yMax };
}

function niceStep(range) {
  if (range <= 0) return 1;
  const rough = range / 6;
  const mag = Math.pow(10, Math.floor(Math.log10(rough)));
  const res = rough / mag;
  if (res <= 1.5) return mag;
  if (res <= 3.5) return 2 * mag;
  if (res <= 7.5) return 5 * mag;
  return 10 * mag;
}

// ══════════════════════════════════════════
// FORMAT
// ══════════════════════════════════════════
function fmt(v, dec = 2) {
  const r = Math.round(v * 1000) / 1000;
  const rounded = Math.round(r * 100) / 100;
  return rounded % 1 === 0 ? rounded.toFixed(0) : rounded.toFixed(dec).replace(/\.?0+$/, '');
}

function fmtFormula(a, b) {
  const aStr = fmt(a);
  const bAbs = Math.abs(b);
  const bStr = fmt(bAbs);
  if (b >= 0) return `y = ${aStr}x + ${bStr}`;
  return `y = ${aStr}x \u2212 ${bStr}`;
}

// ══════════════════════════════════════════
// LINE CALCULATION
// ══════════════════════════════════════════
function calcLine(p1, p2) {
  const dx = p2.x - p1.x;
  const dy = p2.y - p1.y;
  if (Math.abs(dx) < 1e-10) return null;
  const a = dy / dx;
  const b = p1.y - a * p1.x;
  return { a, b };
}

function calcError(line, pt) {
  const predicted = line.a * pt.x + line.b;
  return Math.abs(pt.y - predicted);
}

function calcTotalError(line, pts) {
  return pts.reduce((sum, p) => sum + Math.abs(p.y - (line.a * p.x + line.b)), 0);
}

function calcSquaredError(line, pts) {
  return pts.reduce((sum, p) => { const d = p.y - (line.a * p.x + line.b); return sum + d * d; }, 0);
}

function calcLeastSquares(pts) {
  const n = pts.length;
  const sumX  = pts.reduce((s, p) => s + p.x, 0);
  const sumY  = pts.reduce((s, p) => s + p.y, 0);
  const sumXY = pts.reduce((s, p) => s + p.x * p.y, 0);
  const sumX2 = pts.reduce((s, p) => s + p.x * p.x, 0);
  const denom = n * sumX2 - sumX * sumX;
  if (Math.abs(denom) < 1e-10) return { a: 0, b: sumY / n };
  const a = (n * sumXY - sumX * sumY) / denom;
  const b = (sumY - a * sumX) / n;
  return { a, b };
}

// ══════════════════════════════════════════
// CANVAS RESIZE
// ══════════════════════════════════════════
function resizeCanvas() {
  const wrap = canvas.parentElement;
  const dpr = window.devicePixelRatio || 1;
  canvas.width = wrap.clientWidth * dpr;
  canvas.height = wrap.clientHeight * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

// ══════════════════════════════════════════
// DRAW
// ══════════════════════════════════════════
function redraw() {
  resizeCanvas();
  if (currentTab === 4) drawTab4();
  else drawTab5(null);
}

function drawBase(pts, range) {
  const W = canvas.width / (window.devicePixelRatio || 1);
  const H = canvas.height / (window.devicePixelRatio || 1);
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#1e293b';
  ctx.fillRect(0, 0, W, H);

  const pad = { top: 30, right: 30, bottom: 42, left: 55 };
  const { xMin, xMax, yMin, yMax } = range;
  const plotW = W - pad.left - pad.right;
  const plotH = H - pad.top - pad.bottom;

  function toX(v) { return pad.left + (v - xMin) / (xMax - xMin) * plotW; }
  function toY(v) { return pad.top + plotH - (v - yMin) / (yMax - yMin) * plotH; }

  // Grid
  const xStep = niceStep(xMax - xMin);
  const yStep = niceStep(yMax - yMin);
  ctx.strokeStyle = '#253449';
  ctx.lineWidth = 1;
  ctx.font = '11px "Noto Sans KR"';
  ctx.fillStyle = '#64748b';
  ctx.textAlign = 'center';
  for (let v = Math.ceil(xMin / xStep) * xStep; v <= xMax + 1e-9; v += xStep) {
    const px = toX(v);
    ctx.beginPath(); ctx.moveTo(px, pad.top); ctx.lineTo(px, pad.top + plotH); ctx.stroke();
    ctx.fillText(fmt(v, 0), px, pad.top + plotH + 16);
  }
  ctx.textAlign = 'right';
  for (let v = Math.ceil(yMin / yStep) * yStep; v <= yMax + 1e-9; v += yStep) {
    const py = toY(v);
    ctx.beginPath(); ctx.moveTo(pad.left, py); ctx.lineTo(pad.left + plotW, py); ctx.stroke();
    ctx.fillText(fmt(v, 0), pad.left - 6, py + 4);
  }

  // Axes
  ctx.strokeStyle = '#475569'; ctx.lineWidth = 1.5;
  if (yMin <= 0 && yMax >= 0) {
    const y0 = toY(0);
    ctx.beginPath(); ctx.moveTo(pad.left, y0); ctx.lineTo(pad.left + plotW, y0); ctx.stroke();
  }
  if (xMin <= 0 && xMax >= 0) {
    const x0 = toX(0);
    ctx.beginPath(); ctx.moveTo(x0, pad.top); ctx.lineTo(x0, pad.top + plotH); ctx.stroke();
  }

  // Axis labels
  ctx.fillStyle = '#94a3b8'; ctx.font = '12px "Noto Sans KR"'; ctx.textAlign = 'center';
  ctx.fillText('x', pad.left + plotW / 2, H - 4);
  ctx.save(); ctx.translate(12, pad.top + plotH / 2); ctx.rotate(-Math.PI / 2); ctx.fillText('y', 0, 0); ctx.restore();

  function fromX(px) { return xMin + (px - pad.left) / plotW * (xMax - xMin); }
  function fromY(py) { return yMax - (py - pad.top) / plotH * (yMax - yMin); }

  return { toX, toY, fromX, fromY, pad, plotW, plotH, W, H, xMin, xMax, yMin, yMax };
}

function drawPoints(ctx, pts, toX, toY, labels) {
  if (!labels) labels = POINT_LABELS.slice(0, pts.length);
  pts.forEach((p, i) => {
    const px = toX(p.x), py = toY(p.y);
    const isSelected = currentTab === 4 && selectedPair.includes(i);
    const isDragging = currentTab === 4 && dragIdx === i;
    const r = isDragging ? 11 : 7;

    // Selection ring (white, drawn first / behind)
    if (isSelected) {
      ctx.beginPath();
      ctx.arc(px, py, r + 5, 0, 2 * Math.PI);
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 2.5;
      ctx.stroke();
    }

    // Main dot
    ctx.beginPath();
    ctx.arc(px, py, r, 0, 2 * Math.PI);
    ctx.fillStyle = POINT_COLORS[i] || '#f59e0b';
    ctx.fill();
    ctx.strokeStyle = '#0f172a';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Coordinate tooltip while dragging
    if (isDragging) {
      const txt = `(${fmt(p.x)}, ${fmt(p.y)})`;
      ctx.font = 'bold 15px "Jua"'; ctx.textAlign = 'center';
      const tw = ctx.measureText(txt).width + 12;
      const th = 22;
      const tx = px, ty = py + r + 20;
      ctx.fillStyle = 'rgba(0,0,0,.8)';
      ctx.beginPath();
      ctx.roundRect(tx - tw / 2, ty - th / 2 - 2, tw, th, 6);
      ctx.fill();
      ctx.fillStyle = POINT_COLORS[i] || '#f59e0b';
      ctx.fillText(txt, tx, ty + 4);
    }

    // Label
    ctx.fillStyle = POINT_COLORS[i] || '#f59e0b';
    ctx.font = 'bold 14px "Jua"';
    ctx.textAlign = 'center';
    ctx.fillText(labels[i], px, py - r - 8);
  });
}

function drawLine(ctx, a, b, xMin, xMax, toX, toY, color = '#3b82f6', width = 2.5) {
  ctx.strokeStyle = color; ctx.lineWidth = width;
  ctx.beginPath();
  ctx.moveTo(toX(xMin), toY(a * xMin + b));
  ctx.lineTo(toX(xMax), toY(a * xMax + b));
  ctx.stroke();
}

function drawErrorLine(ctx, pt, a, b, toX, toY, color = '#ef4444') {
  const predicted = a * pt.x + b;
  const px = toX(pt.x);
  const py1 = toY(pt.y);
  const py2 = toY(predicted);
  ctx.strokeStyle = color; ctx.lineWidth = 2;
  ctx.setLineDash([5, 4]);
  ctx.beginPath(); ctx.moveTo(px, py1); ctx.lineTo(px, py2); ctx.stroke();
  ctx.setLineDash([]);

  const err = Math.abs(pt.y - predicted);
  if (err > 0.01) {
    ctx.fillStyle = color; ctx.font = 'bold 12px "Jua"'; ctx.textAlign = 'left';
    ctx.fillText(fmt(err), px + 7, (py1 + py2) / 2 + 4);
  }
}

// ══════════════════════════════════════════
// DRAG / CLICK — INTERACTION (Tab 4)
// ══════════════════════════════════════════
function canvasXY(e) {
  const rect = canvas.getBoundingClientRect();
  return { x: e.clientX - rect.left, y: e.clientY - rect.top };
}

function hitTestPoint(px, py) {
  if (currentTab !== 4 || !lastGrid) return -1;
  const hitR = 18;
  for (let i = 0; i < points.length; i++) {
    const sx = lastGrid.toX(points[i].x);
    const sy = lastGrid.toY(points[i].y);
    const dx = px - sx, dy = py - sy;
    if (dx * dx + dy * dy <= hitR * hitR) return i;
  }
  return -1;
}

function snap05(v) { return Math.round(v * 2) / 2; }

function syncPointInput(idx, x, y) {
  points[idx].x = x;
  points[idx].y = y;
  // Update input fields without full re-render (preserve focus)
  const xEl = document.getElementById('px_' + idx);
  const yEl = document.getElementById('py_' + idx);
  if (xEl) xEl.value = x;
  if (yEl) yEl.value = y;
}

function onPointMoved() {
  selectedPair = [];
  triedPairs = [];
  updateSelectedInfo();
  showCalcPlaceholder();
  hideCompTable();
  redraw();
}

function onDragStart(e) {
  const { x, y } = canvasXY(e);
  dragStartPos = { x, y };
  dragMoved = false;
  dragIdx = hitTestPoint(x, y);
  if (dragIdx >= 0) canvas.style.cursor = 'grabbing';
}

function onDragMove(e) {
  if (dragIdx < 0) {
    // Hover cursor
    const { x, y } = canvasXY(e);
    const overPt = currentTab === 4 && hitTestPoint(x, y) >= 0;
    canvas.style.cursor = overPt ? (selectMode ? 'pointer' : 'grab') : '';
    return;
  }
  const { x, y } = canvasXY(e);
  // Check if moved beyond threshold
  if (!dragMoved && dragStartPos) {
    const dx = x - dragStartPos.x, dy = y - dragStartPos.y;
    if (dx * dx + dy * dy > 25) dragMoved = true; // 5px threshold
  }
  if (!dragMoved) return;
  if (!lastGrid) return;
  const dataX = snap05(lastGrid.fromX(x));
  const dataY = snap05(lastGrid.fromY(y));
  syncPointInput(dragIdx, dataX, dataY);
  onPointMoved();
}

function onDragEnd(e) {
  if (dragIdx >= 0) {
    if (!dragMoved) {
      // Treat as click — select this point
      handlePointClick(dragIdx);
    }
    dragIdx = -1;
    canvas.style.cursor = '';
  }
  dragStartPos = null;
  dragMoved = false;
}

function onTouchStart(e) {
  if (currentTab !== 4) return;
  const touch = e.touches[0];
  const { x, y } = canvasXY(touch);
  dragStartPos = { x, y };
  dragMoved = false;
  dragIdx = hitTestPoint(x, y);
  if (dragIdx >= 0) e.preventDefault();
}

function onTouchMove(e) {
  if (dragIdx < 0) return;
  e.preventDefault();
  const touch = e.touches[0];
  const { x, y } = canvasXY(touch);
  if (!dragMoved && dragStartPos) {
    const dx = x - dragStartPos.x, dy = y - dragStartPos.y;
    if (dx * dx + dy * dy > 25) dragMoved = true;
  }
  if (!dragMoved) return;
  if (!lastGrid) return;
  const dataX = snap05(lastGrid.fromX(x));
  const dataY = snap05(lastGrid.fromY(y));
  syncPointInput(dragIdx, dataX, dataY);
  onPointMoved();
}

function onTouchEnd(e) {
  if (dragIdx >= 0) {
    if (!dragMoved) {
      handlePointClick(dragIdx);
    }
    dragIdx = -1;
  }
  dragStartPos = null;
  dragMoved = false;
}

// ══════════════════════════════════════════
// TAB 4 DRAWING
// ══════════════════════════════════════════
function drawTab4() {
  let extraA, extraB;
  if (selectedPair.length === 2) {
    const pair = triedPairs.find(p =>
      (p.i1 === selectedPair[0] && p.i2 === selectedPair[1]) ||
      (p.i1 === selectedPair[1] && p.i2 === selectedPair[0]));
    if (pair) { extraA = pair.a; extraB = pair.b; }
  }

  const range = calcAxisRange(points, extraA, extraB);
  const grid = drawBase(points, range);
  lastGrid = grid;
  const { toX, toY, xMin, xMax } = grid;

  // Draw line and error lines for non-selected points
  if (selectedPair.length === 2) {
    const pair = triedPairs.find(p =>
      (p.i1 === selectedPair[0] && p.i2 === selectedPair[1]) ||
      (p.i1 === selectedPair[1] && p.i2 === selectedPair[0]));
    if (pair) {
      drawLine(ctx, pair.a, pair.b, xMin, xMax, toX, toY, '#3b82f6', 2.5);
      // Draw error lines only for points NOT used to define the line
      points.forEach((pt, i) => {
        if (i !== selectedPair[0] && i !== selectedPair[1]) {
          drawErrorLine(ctx, pt, pair.a, pair.b, toX, toY, '#ef4444');
        }
      });
    }
  }

  const labels = POINT_LABELS.slice(0, points.length);
  drawPoints(ctx, points, toX, toY, labels);
}

// ══════════════════════════════════════════
// TAB 4 CALCULATION DISPLAY
// ══════════════════════════════════════════
function showCalcPlaceholder() {
  document.getElementById('calcDisplay').innerHTML =
    '<div class="placeholder">그래프에서 두 점을 클릭하면 계산 과정이 나타납니다.</div>';
}

function hideCompTable() {
  document.getElementById('compTableWrap').style.display = 'none';
}

function showCalc(i1, i2, p1, p2, line, remainingPts) {
  const l1 = POINT_LABELS[i1], l2 = POINT_LABELS[i2];
  const a = line.a, b = line.b;
  const aFmt = fmt(a);
  const bAbs = Math.abs(b);
  const bSign = b >= 0 ? '+' : '\u2212';
  const bFmt = fmt(bAbs);

  const dy = p2.y - p1.y;
  const dx = p2.x - p1.x;
  const ax_val = fmt(a * p1.x);
  const b_calc = fmt(b);

  // Build error rows for all remaining points
  let errorRows = '';
  let sqTerms = [];
  remainingPts.forEach(({ pt, idx }) => {
    const remLabel = POINT_LABELS[idx];
    const predicted = a * pt.x + b;
    const predFmt = fmt(predicted);
    const diff = pt.y - predicted;
    const err = Math.abs(diff);
    const errFmt = fmt(err);
    const sqVal = diff * diff;
    sqTerms.push({ label: remLabel, err, sqVal });
    errorRows += `
      <br><strong>${remLabel}(${fmt(pt.x)}, ${fmt(pt.y)})</strong>:
      직선 위의 값 = ${aFmt} × ${fmt(pt.x)} ${bSign} ${bFmt} = <span class="val">${predFmt}</span><br>
      세로 거리 = ${fmt(pt.y)} − ${predFmt} = <span class="error-val">${fmt(diff)}</span>
      &nbsp;→&nbsp; 제곱 = <span class="error-val">${fmt(sqVal)}</span>`;
  });
  // 선택된 두 점은 오차 0 (직선 위에 있음)
  const sqSum = sqTerms.reduce((s, t) => s + t.sqVal, 0);
  const sqSumParts = sqTerms.map(t => fmt(t.sqVal)).join(' + ');
  errorRows += `<br><br><strong>오차² 합 = ${sqSumParts} = <span class="result">${fmt(sqSum)}</span></strong>`;

  const html = `
  <div class="calc-step highlight">
    <div class="step-num">① 기울기 a 구하기</div>
    <div class="step-content">
      a = (y₂ − y₁) ÷ (x₂ − x₁)<br>
      a = (<span class="val">${fmt(p2.y)}</span> − <span class="val">${fmt(p1.y)}</span>) ÷ (<span class="val">${fmt(p2.x)}</span> − <span class="val">${fmt(p1.x)}</span>)<br>
      a = ${fmt(dy)} ÷ ${fmt(dx)} = <span class="result">${aFmt}</span>
    </div>
  </div>
  <div class="calc-step">
    <div class="step-num">② 시작 높이 b 구하기</div>
    <div class="step-content">
      ${l1}(${fmt(p1.x)}, ${fmt(p1.y)})을 대입: &nbsp;${fmt(p1.y)} = ${aFmt} × ${fmt(p1.x)} + b<br>
      ${fmt(p1.y)} = ${ax_val} + b &nbsp;→&nbsp; b = <span class="result">${b_calc}</span>
    </div>
  </div>
  <div class="calc-step">
    <div class="step-num">③ 직선의 식</div>
    <div class="step-content">
      <span class="result">${fmtFormula(a, b)}</span>
    </div>
  </div>
  <div class="calc-step" style="border-left-color:var(--danger);">
    <div class="step-num">④ 나머지 점들의 세로 거리와 제곱 구하기</div>
    <div class="step-content">${remainingPts.length > 0 ? errorRows : '(나머지 점 없음)'}
    </div>
  </div>`;

  document.getElementById('calcDisplay').innerHTML = html;
}

function updateCompTable() {
  if (triedPairs.length === 0) { hideCompTable(); return; }

  // Find best (smallest sqErr)
  let bestErr = Infinity;
  triedPairs.forEach(p => { if (p.sqErr < bestErr) bestErr = p.sqErr; });

  let rows = '';
  triedPairs.forEach(p => {
    const isBest = Math.abs(p.sqErr - bestErr) < 1e-9 && triedPairs.length > 1;
    const isCurrent = selectedPair.length === 2 &&
      ((p.i1 === selectedPair[0] && p.i2 === selectedPair[1]) ||
       (p.i1 === selectedPair[1] && p.i2 === selectedPair[0]));
    const cls = isBest ? 'best-row' : (isCurrent ? 'current-row' : '');
    rows += `<tr class="${cls}">
      <td>${p.label}</td>
      <td>${fmtFormula(p.a, p.b)}</td>
      <td>${fmt(p.sqErr)}</td>
    </tr>`;
  });

  const wrap = document.getElementById('compTableWrap');
  wrap.style.display = '';
  wrap.innerHTML = `
    <div class="comparison-title">조합별 비교</div>
    <table class="comp">
      <thead><tr><th>조합</th><th>직선의 식</th><th>오차² 합</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    ${triedPairs.length >= 2 ? `<div class="question-box">어떤 조합의 오차² 합이 가장 작을까? &nbsp; (초록색 행)</div>` : ''}
  `;
}

// ══════════════════════════════════════════
// TAB 5 DRAWING
// ══════════════════════════════════════════
function drawTab5(lineParams) {
  const pts = getAllPoints();
  const a = lineParams ? lineParams.a : null;
  const b = lineParams ? lineParams.b : null;
  const range = calcAxisRange(pts, a, b);
  const { toX, toY, xMin, xMax } = drawBase(pts, range);

  if (lineParams) {
    drawLine(ctx, lineParams.a, lineParams.b, xMin, xMax, toX, toY, '#f59e0b', 3);
    pts.forEach(p => {
      drawErrorLine(ctx, p, lineParams.a, lineParams.b, toX, toY, '#ef4444');
    });
  }

  const labels = POINT_LABELS.slice(0, pts.length);
  drawPoints(ctx, pts, toX, toY, labels);
}

// ══════════════════════════════════════════
// ANIMATION
// ══════════════════════════════════════════
function easeInOut(t) {
  return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
}

function wanderNoise(t, freq, amp) {
  const fade = Math.max(0, 1 - t * 1.5);
  return amp * fade * Math.sin(freq * t * Math.PI * 2 + 1.3) * Math.cos(freq * 0.7 * t * Math.PI + 0.4);
}

function startAnimation(slow) {
  if (animId) { cancelAnimationFrame(animId); animId = null; }

  document.getElementById('resultBox').style.display = 'none';
  document.getElementById('animPlaceholder').style.display = 'none';
  document.getElementById('errorSumBox').style.display = '';
  document.getElementById('errorSumValue').style.color = '#ef4444';

  animSlow = slow;
  animDuration = slow ? 10000 : 5000;

  const pts = getAllPoints();
  const opt = calcLeastSquares(pts);
  animOptA = opt.a;
  animOptB = opt.b;

  const seed = Math.random();
  animStartA = animOptA + (seed < 0.5 ? 2 : -2) + (Math.random() - 0.5) * 3;
  animStartB = animOptB + (Math.random() - 0.5) * 8;

  document.getElementById('btnReplay').disabled = false;

  animStartTime = null;
  animId = requestAnimationFrame(animFrame);
}

function animFrame(timestamp) {
  if (!animStartTime) animStartTime = timestamp;
  const elapsed = timestamp - animStartTime;
  let t = Math.min(elapsed / animDuration, 1);

  const pts = getAllPoints();

  const noise_a = wanderNoise(t, 3, 1.5);
  const noise_b = wanderNoise(t, 2, 4);

  const te = easeInOut(t);
  const curA = animStartA + (animOptA - animStartA) * te + noise_a;
  const curB = animStartB + (animOptB - animStartB) * te + noise_b;

  drawTab5({ a: curA, b: curB });

  const errSum = calcSquaredError({ a: curA, b: curB }, pts);
  const errDisplay = document.getElementById('errorSumValue');
  errDisplay.textContent = fmt(errSum, 2);

  const optErr = calcSquaredError({ a: animOptA, b: animOptB }, pts);
  const maxErr = calcSquaredError({ a: animStartA, b: animStartB }, pts);
  const ratio = (errSum - optErr) / Math.max(maxErr - optErr, 0.1);
  const clampedRatio = Math.max(0, Math.min(1, ratio));
  errDisplay.style.color = interpolateColor(clampedRatio);

  document.getElementById('currentFormulaDisplay').textContent = fmtFormula(curA, curB);

  if (t < 1) {
    animId = requestAnimationFrame(animFrame);
  } else {
    drawTab5({ a: animOptA, b: animOptB });
    document.getElementById('errorSumValue').textContent = fmt(calcSquaredError({ a: animOptA, b: animOptB }, pts), 2);
    document.getElementById('errorSumValue').style.color = '#10b981';
    document.getElementById('currentFormulaDisplay').textContent = fmtFormula(animOptA, animOptB);
    animId = null;
    showResult(pts);
  }
}

function interpolateColor(ratio) {
  if (ratio > 0.5) {
    const t = (ratio - 0.5) * 2;
    const r = 239, g = Math.round(68 + (158 - 68) * (1 - t)), b = 68;
    return `rgb(${r},${g},${b})`;
  } else {
    const t = ratio * 2;
    const r = Math.round(245 * t), g = Math.round(158 + (185 - 158) * (1 - t)), b2 = Math.round(11 * t + 129 * (1 - t));
    return `rgb(${r},${g},${b2})`;
  }
}

function showResult(pts) {
  const resultBox = document.getElementById('resultBox');
  resultBox.style.display = '';
  resultBox.classList.add('flash-anim');
  setTimeout(() => resultBox.classList.remove('flash-anim'), 800);

  document.getElementById('resultFormula').textContent = `추세선의 식: ${fmtFormula(animOptA, animOptB)}`;

  const trendSqErr = calcSquaredError({ a: animOptA, b: animOptB }, pts);

  // Trend line row first
  let rows = `<tr class="trend-row"><td>추세선</td><td>${fmtFormula(animOptA, animOptB)}</td><td>${fmt(trendSqErr)}</td></tr>`;

  // All tried pairs from Tab 4
  if (triedPairs.length > 0) {
    triedPairs.forEach(p => {
      const sqErr = calcSquaredError({ a: p.a, b: p.b }, pts);
      rows += `<tr><td>${p.label} 직선</td><td>${fmtFormula(p.a, p.b)}</td><td>${fmt(sqErr)}</td></tr>`;
    });
  }

  document.getElementById('resultCompare').innerHTML = `
    <div style="font-size:13px;color:var(--muted);margin-bottom:8px;font-family:'Jua',sans-serif;">오차² 합 비교</div>
    <table class="res-comp">
      <thead><tr><th>직선</th><th>식</th><th>오차² 합</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <div style="margin-top:10px;font-size:13px;color:var(--muted);font-family:'Jua',sans-serif;">
      세로 거리를 <strong style="color:var(--accent);">제곱</strong>하면 음수가 사라져요.<br>
      추세선은 이 <strong style="color:var(--accent3);">제곱 합이 가장 작은</strong> 직선입니다!
    </div>
  `;
}

</script>
